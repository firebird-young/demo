<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>商家登录注册 · 元宇宙商城</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f0f2f5;color:#333;display:flex;justify-content:center;align-items:center;min-height:100vh}
.page{width:100%;max-width:420px;padding:40px 32px}

.logo{text-align:center;margin-bottom:36px}
.logo-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#667eea,#764ba2);margin:0 auto 14px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:28px;height:28px;color:#fff}
.logo h1{font-size:20px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.logo p{font-size:12px;color:#999}

.card{background:#fff;border-radius:16px;padding:32px 28px;box-shadow:0 4px 20px rgba(0,0,0,.06)}

.form-group{margin-bottom:18px}
.form-label{display:block;font-size:13px;color:#666;margin-bottom:6px;font-weight:500}
.form-input{width:100%;height:46px;padding:0 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;color:#333;outline:none;transition:border .25s;background:#fff}
.form-input:focus{border-color:#667eea}
.form-input::placeholder{color:#ccc}
.submit-btn{width:100%;height:48px;border:none;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .2s}
.submit-btn:active{opacity:.9}

.switch-hint{text-align:center;margin-top:18px;font-size:13px;color:#999}
.switch-hint a{color:#667eea;cursor:pointer;font-weight:600;text-decoration:none}
.switch-hint a:hover{text-decoration:underline}

#registerForm{display:none}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.78);color:#fff;font-size:14px;padding:14px 28px;border-radius:8px;z-index:200;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="page">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </div>
    <h1>商家中心</h1>
    <p>元宇宙商城 · 合作伙伴平台</p>
  </div>

  <div class="card">
    <!-- 登录表单（默认） -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">商家简称</label>
        <input class="form-input" id="loginName" placeholder="请输入商家简称" required>
      </div>
      <div class="form-group">
        <label class="form-label">账号</label>
        <input class="form-input" id="loginAccount" placeholder="请输入账号" required>
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input class="form-input" id="loginPassword" type="password" placeholder="请输入密码" required>
      </div>
      <button class="submit-btn" type="submit">登录</button>
    </form>

    <!-- 注册表单（隐藏） -->
    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label">商家简称</label>
        <input class="form-input" id="regName" placeholder="请输入商家简称" required>
      </div>
      <div class="form-group">
        <label class="form-label">账号</label>
        <input class="form-input" id="regAccount" placeholder="请输入账号" required>
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input class="form-input" id="regPassword" type="password" placeholder="请输入密码（至少6位）" required minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">确认密码</label>
        <input class="form-input" id="regConfirm" type="password" placeholder="请再次输入密码" required minlength="6">
      </div>
      <button class="submit-btn" type="submit">注册入驻</button>
    </form>

    <div class="switch-hint" id="switchHint">
      没有账号？<a onclick="switchToRegister()">去注册</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var isRegister=false;
function switchToRegister(){
  isRegister=true;
  document.getElementById('loginForm').style.display='none';
  document.getElementById('registerForm').style.display='block';
  document.getElementById('switchHint').innerHTML='已有账号？<a onclick="switchToLogin()">去登录</a>';
}
function switchToLogin(){
  isRegister=false;
  document.getElementById('loginForm').style.display='block';
  document.getElementById('registerForm').style.display='none';
  document.getElementById('switchHint').innerHTML='没有账号？<a onclick="switchToRegister()">去注册</a>';
}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2000)}

function handleRegister(e){
  e.preventDefault();
  var name=document.getElementById('regName').value.trim();
  var account=document.getElementById('regAccount').value.trim();
  var pwd=document.getElementById('regPassword').value;
  var cfm=document.getElementById('regConfirm').value;
  if(!name||!account||!pwd){toast('请填写所有字段');return}
  if(pwd.length<6){toast('密码至少6位');return}
  if(pwd!==cfm){toast('两次密码不一致');return}
  var users=JSON.parse(localStorage.getItem('merchants')||'[]');
  if(users.find(function(u){return u.account===account})){toast('该账号已注册');return}
  users.push({name:name,account:account,password:pwd,certStatus:'unauth',certData:null,logo:'',tag:''});
  localStorage.setItem('merchants',JSON.stringify(users));
  localStorage.setItem('merchantLogin',JSON.stringify({name:name,account:account,certStatus:'unauth',logo:'',tag:''}));
  toast('注册成功，即将跳转');
  setTimeout(function(){location.href='dashboard.html'},1000)
}

function handleLogin(e){
  e.preventDefault();
  var name=document.getElementById('loginName').value.trim();
  var account=document.getElementById('loginAccount').value.trim();
  var pwd=document.getElementById('loginPassword').value;
  if(!name||!account||!pwd){toast('请填写所有字段');return}
  var users=JSON.parse(localStorage.getItem('merchants')||'[]');
  var u=users.find(function(u){return u.name===name&&u.account===account&&u.password===pwd});
  if(!u){toast('商家简称、账号或密码错误');return}
  localStorage.setItem('merchantLogin',JSON.stringify({name:u.name,account:u.account,certStatus:u.certStatus||'unauth',logo:u.logo||'',tag:u.tag||''}));
  toast('登录成功，即将跳转');
  setTimeout(function(){location.href='dashboard.html'},1000)
}
</script>
</body>
</html>
