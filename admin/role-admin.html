<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>角色管理 - 元宇宙商城后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }

    .header { background: linear-gradient(135deg, #D70C1F, #F12B3D); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-size: 18px; font-weight: 600; }
    .header-user { font-size: 14px; }

    .main-container { display: flex; min-height: calc(100vh - 60px); }

    .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; padding: 16px 0; }
    .sidebar-group-title { padding: 8px 24px; font-size: 12px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .sidebar-item { padding: 10px 24px 10px 48px; font-size: 14px; color: #666; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; text-decoration: none !important; }
    .sidebar-item:hover { background: #f5f5f5; color: #D70C1F; }
    .sidebar-item.active { background: rgba(215, 12, 31, 0.1); color: #D70C1F; font-weight: 600; }
    .sidebar-item svg { width: 14px; height: 14px; flex-shrink: 0; }

    .content { flex: 1; padding: 24px; overflow-y: auto; }
    .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .content-title { font-size: 18px; font-weight: 600; color: #1a1a2e; }
    .header-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: #D70C1F; color: #fff; }
    .btn-primary:hover { background: #c60a1b; }
    .btn-default { background: #fff; color: #666; border: 1px solid #ddd; }
    .btn-default:hover { background: #f5f5f5; }
    .btn-edit { background: #e8f0fe; color: #1a73e8; border: 1px solid #c4d7f2; font-size: 12px; padding: 4px 10px; }
    .btn-edit:hover { background: #d2e3fc; }

    .filter-bar { display: flex; align-items: center; gap: 8px; }
    .filter-bar label { font-size: 13px; color: #666; }
    .filter-bar select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; }

    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

    .stats-row { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { flex: 1; min-width: 150px; background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 12px; }
    .stat-card .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .stat-card .stat-info { flex: 1; }
    .stat-card .stat-value { font-size: 22px; font-weight: 700; color: #1a1a2e; }
    .stat-card .stat-label { font-size: 12px; color: #999; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    th { background: #fafafa; font-weight: 600; color: #666; }
    tr:hover { background: #fafafa; }
    .role-avatar { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; }

    /* modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close { width: 28px; height: 28px; border-radius: 50%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; color: #666; }
    .modal-close:hover { background: #e8e8e8; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 12px; }

    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
    .form-input, .form-select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
    .form-input:focus, .form-select:focus { border-color: #D70C1F; }
    .upload-box { width: 80px; height: 80px; border: 2px dashed #ddd; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color 0.2s; overflow: hidden; background-size: cover; background-position: center; background-repeat: no-repeat; }
    .upload-box:hover { border-color: #D70C1F; }
    .upload-box svg { width: 24px; height: 24px; color: #ccc; }
    #roleImgInput { display: none; }

    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 2000; animation: slideIn 0.3s ease; }
    .toast.success { background: rgba(7, 193, 96, 0.9); color: #fff; }
    @keyframes slideIn { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }

    .empty-state { padding: 60px 0; text-align: center; color: #999; font-size: 14px; }

    @media (max-width: 768px) {
      .main-container { flex-direction: column; }
      .sidebar { width: 100%; display: flex; flex-wrap: wrap; padding: 8px; gap: 4px; }
      .sidebar-group-title { width: 100%; padding: 4px 8px; }
      .sidebar-item { padding: 6px 12px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">元宇宙商城 - 后台管理</div>
    <div class="header-user">管理员</div>
  </div>

  <div class="main-container">
    <div class="sidebar">
      <div class="sidebar-group-title">元宇宙管理</div>
      <div class="sidebar-item" onclick="navigateTo('scene-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>场景管理</div>
      <div class="sidebar-item" onclick="navigateTo('hotspot-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>热区标注</div>
      <div class="sidebar-item" onclick="navigateTo('path-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="12 19 19 12 12 5 5 12"/><circle cx="12" cy="12" r="3"/></svg>跳转路径</div>
      <div class="sidebar-item" onclick="navigateTo('space-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>商家元宇宙空间管理</div>
      <div class="sidebar-item active" onclick="navigateTo('role-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>角色管理</div>
      <div class="sidebar-group-title">数字资产</div>
      <div class="sidebar-item" onclick="navigateTo('asset-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>数字资产管理</div>
      <div class="sidebar-item" onclick="navigateTo('order-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>订单管理</div>
      <div class="sidebar-group-title">会员管理</div>
      <div class="sidebar-item" onclick="navigateTo('user-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>用户管理</div>
      <div class="sidebar-item" onclick="navigateTo('merchant-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>商家管理</div>
      <div class="sidebar-group-title">审核管理</div>
      <div class="sidebar-item" onclick="navigateTo('cert-review.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>商家审核管理</div>
      <div class="sidebar-group-title">系统管理</div>
      <div class="sidebar-item" onclick="navigateTo('wallet-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>钱包管理</div>
    </div>

    <div class="content">
      <div class="content-header">
        <div class="content-title">角色管理</div>
        <div class="header-actions">
          <div class="filter-bar">
            <label>性别：</label>
            <select id="genderFilter" onchange="renderList()">
              <option value="all">全部</option>
              <option value="male">男</option>
              <option value="female">女</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="openAddModal()">+ 新增角色</button>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(215,12,31,.1);color:#D70C1F">👤</div>
          <div class="stat-info">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">总角色数</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(30,144,255,.1);color:#1e90ff">👨</div>
          <div class="stat-info">
            <div class="stat-value" id="statMale">0</div>
            <div class="stat-label">男角色</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(255,105,180,.1);color:#ff69b4">👩</div>
          <div class="stat-info">
            <div class="stat-value" id="statFemale">0</div>
            <div class="stat-label">女角色</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(76,175,80,.1);color:#4caf50">✅</div>
          <div class="stat-info">
            <div class="stat-value" id="statSelected">0</div>
            <div class="stat-label">总选择人次</div>
          </div>
        </div>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th style="width:70px">角色图片</th>
              <th>名称</th>
              <th>性别</th>
              <th>选择人数</th>
              <th style="width:100px">操作</th>
            </tr>
          </thead>
          <tbody id="roleTableBody">
            <!-- JS渲染 -->
          </tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display:none">暂无角色数据</div>
      </div>
    </div>
  </div>

  <!-- 新增/编辑弹窗 -->
  <div class="modal-overlay" id="roleModal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">新增角色</div>
        <div class="modal-close" onclick="closeModal()">✕</div>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">角色名称</label>
          <input class="form-input" id="roleName" placeholder="请输入角色名称" maxlength="20">
        </div>
        <div class="form-group">
          <label class="form-label">性别</label>
          <select class="form-select" id="roleGender">
            <option value="male">男</option>
            <option value="female">女</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">角色图片</label>
          <div class="upload-box" id="roleImgBox" onclick="document.getElementById('roleImgInput').click()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <input type="file" id="roleImgInput" accept="image/*" onchange="handleImgUpload(this)">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="modalConfirmBtn" onclick="saveRole()">确认</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" style="display:none"></div>

<script>
  var roles = [
    { id: 1, name: '李白', gender: 'male', img: '../李白待机.gif', selectedCount: 128 },
    { id: 2, name: '诸葛亮', gender: 'male', img: '../诸葛亮待机.gif', selectedCount: 96 },
    { id: 3, name: '都江堰', gender: 'male', img: '../都江堰待机.gif', selectedCount: 73 },
    { id: 4, name: '娲皇宫', gender: 'female', img: '../娲皇宫待机.gif', selectedCount: 105 },
    { id: 5, name: '安仁古镇', gender: 'female', img: '../安仁古镇待机.gif', selectedCount: 88 },
    { id: 6, name: '李白纪念馆', gender: 'female', img: '../李白纪念馆待机.gif', selectedCount: 61 }
  ];
  var nextId = 7;
  var imgData = '';
  var editingId = null;

  function navigateTo(url) { window.location.href = url; }

  function renderList() {
    var gender = document.getElementById('genderFilter').value;
    var filtered = gender === 'all' ? roles : roles.filter(function(r){ return r.gender === gender; });
    var tbody = document.getElementById('roleTableBody');
    var empty = document.getElementById('emptyState');
    if (filtered.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      tbody.innerHTML = filtered.map(function(r){
        return '<tr>' +
          '<td><img class="role-avatar" src="' + r.img + '" alt="' + r.name + '"></td>' +
          '<td>' + r.name + '</td>' +
          '<td>' + (r.gender === 'male' ? '👨 男' : '👩 女') + '</td>' +
          '<td>' + r.selectedCount + ' 人</td>' +
          '<td><button class="btn btn-edit" onclick="editRole(' + r.id + ')">修改</button></td>' +
          '</tr>';
      }).join('');
    }
    updateStats();
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = roles.length;
    document.getElementById('statMale').textContent = roles.filter(function(r){ return r.gender === 'male'; }).length;
    document.getElementById('statFemale').textContent = roles.filter(function(r){ return r.gender === 'female'; }).length;
    var total = roles.reduce(function(sum, r){ return sum + r.selectedCount; }, 0);
    document.getElementById('statSelected').textContent = total;
  }

  function editRole(id) {
    var role = roles.find(function(r){ return r.id === id; });
    if (!role) return;
    editingId = id;
    imgData = role.img;
    document.getElementById('modalTitle').textContent = '修改角色';
    document.getElementById('modalConfirmBtn').textContent = '保存修改';
    document.getElementById('roleName').value = role.name;
    document.getElementById('roleGender').value = role.gender;
    document.getElementById('roleImgBox').style.backgroundImage = 'url(' + role.img + ')';
    document.getElementById('roleImgBox').innerHTML = '';
    document.getElementById('roleImgInput').value = '';
    document.getElementById('roleModal').classList.add('show');
  }

  function openAddModal() {
    editingId = null;
    imgData = '';
    document.getElementById('modalTitle').textContent = '新增角色';
    document.getElementById('modalConfirmBtn').textContent = '确认新增';
    document.getElementById('roleName').value = '';
    document.getElementById('roleGender').value = 'male';
    document.getElementById('roleImgBox').style.backgroundImage = '';
    document.getElementById('roleImgBox').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>';
    document.getElementById('roleImgInput').value = '';
    document.getElementById('roleModal').classList.add('show');
  }

  function closeModal() {
    document.getElementById('roleModal').classList.remove('show');
  }

  function handleImgUpload(input) {
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      imgData = e.target.result;
      var box = document.getElementById('roleImgBox');
      box.style.backgroundImage = 'url(' + imgData + ')';
      box.innerHTML = '';
    };
    reader.readAsDataURL(file);
  }

  function saveRole() {
    var name = document.getElementById('roleName').value.trim();
    var gender = document.getElementById('roleGender').value;
    if (!name) { toast('请输入角色名称'); return; }
    if (!imgData) { toast('请上传角色图片'); return; }

    if (editingId) {
      var role = roles.find(function(r){ return r.id === editingId; });
      if (role) {
        role.name = name;
        role.gender = gender;
        role.img = imgData;
      }
      toast('修改成功');
    } else {
      roles.push({ id: nextId++, name: name, gender: gender, img: imgData, selectedCount: 0 });
      toast('新增成功');
    }
    closeModal();
    renderList();
  }

  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast success';
    t.style.display = 'block';
    clearTimeout(t._timer);
    t._timer = setTimeout(function(){ t.style.display = 'none'; }, 2000);
  }

  renderList();
</script>
</body>
</html>
