﻿﻿﻿﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>跳转路径 - 元宇宙商城后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }

    /* ── 顶部导航 ── */
    .header { background: linear-gradient(135deg, #D70C1F, #F12B3D); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-size: 18px; font-weight: 600; }
    .header-user { font-size: 14px; }

    /* ── 主布局 ── */
    .main-container { display: flex; min-height: calc(100vh - 60px); }

    /* ── 左侧菜单 ── */
    .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; padding: 16px 0; }
    .sidebar-group-title { padding: 8px 24px; font-size: 12px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .sidebar-item { padding: 10px 24px 10px 48px; font-size: 14px; color: #666; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .sidebar-item:hover { background: #f5f5f5; color: #D70C1F; }
    .sidebar-item.active { background: rgba(215, 12, 31, 0.1); color: #D70C1F; font-weight: 600; }
    .sidebar-item svg { width: 14px; height: 14px; }

    /* ── 右侧内容区 ── */
    .content { flex: 1; padding: 24px; overflow-y: auto; }
    .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .content-title { font-size: 18px; font-weight: 600; color: #1a1a2e; }
    .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: #D70C1F; color: #fff; }
    .btn-primary:hover { background: #c60a1b; }
    .btn-default { background: #fff; color: #666; border: 1px solid #ddd; }
    .btn-default:hover { background: #f5f5f5; }

    /* ── 卡片样式 ── */
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1a1a2e; }

    /* ── 表单样式 ── */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: #D70C1F; }
    .form-select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }

    /* ── 箭头位置选择 ── */
    .arrow-position-group { margin-top: 8px; }
    .pos-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .pos-row:last-child { margin-bottom: 0; }
    .pos-label { font-size: 12px; color: #666; width: 60px; }
    .pos-buttons { display: flex; gap: 8px; }
    .pos-btn { padding: 6px 16px; font-size: 12px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; }
    .pos-btn:hover { background: #f5f5f5; }
    .pos-btn.active { background: #D70C1F; color: #fff; border-color: #D70C1F; }

    /* ── 跳转路径设置 ── */
    .path-list { margin-top: 16px; }
    .path-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: #f9f9f9; border-radius: 8px; margin-bottom: 8px; }
    .path-from { flex: 1; font-size: 14px; color: #333; }
    .path-arrow { color: #999; }
    .path-to { flex: 1; font-size: 14px; color: #D70C1F; }
    .path-info { font-size: 12px; color: #999; }
    .path-delete { width: 28px; height: 28px; border-radius: 50%; background: #fff; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .path-delete svg { width: 14px; height: 14px; color: #999; }

    /* ── 模态框 ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close { width: 28px; height: 28px; border-radius: 50%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .modal-close svg { width: 14px; height: 14px; color: #666; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 12px; }

    /* ── 空状态 ── */
    .empty-state { padding: 60px 0; text-align: center; }
    .empty-icon { width: 64px; height: 64px; margin: 0 auto 16px; background: #f5f5f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .empty-icon svg { width: 32px; height: 32px; color: #ccc; }
    .empty-text { font-size: 14px; color: #999; }

    /* ── 提示信息 ── */
    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 2000; animation: slideIn 0.3s ease; }
    .toast.success { background: rgba(7, 193, 96, 0.9); color: #fff; }
    .toast.error { background: rgba(215, 12, 31, 0.9); color: #fff; }
    @keyframes slideIn { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <div class="header">
    <div class="header-title">元宇宙商城 - 后台管理</div>
    <div class="header-user">管理员</div>
  </div>

  <!-- 主布局 -->
  <div class="main-container">
    <!-- 左侧菜单 -->
        <div class="sidebar">
      <div class="sidebar-group-title">元宇宙管理</div>
      <div class="sidebar-item" onclick="navigateTo('hotspot-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>场景和热区</div>
      <div class="sidebar-item active" onclick="navigateTo('path-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="12 19 19 12 12 5 5 12"/><circle cx="12" cy="12" r="3"/></svg>跳转路径</div>
      <div class="sidebar-item" onclick="navigateTo('map-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="3 9 12 15 21 9"/></svg>主地图管理</div>
      <div class="sidebar-item" onclick="navigateTo('space-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>商家元宇宙空间管理</div>
      <div class="sidebar-item" onclick="navigateTo('role-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>角色管理</div>
      <div class="sidebar-item" onclick="navigateTo('dashboard-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>元宇宙看板</div>
      <div class="sidebar-group-title">数字资产</div>
      <div class="sidebar-item" onclick="navigateTo('asset-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>数字资产管理</div>
      <div class="sidebar-item" onclick="navigateTo('order-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>订单管理</div>
      <div class="sidebar-group-title">会员管理</div>
      <div class="sidebar-item" onclick="navigateTo('user-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>用户管理</div>
      <div class="sidebar-item" onclick="navigateTo('merchant-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>商家管理</div>
      <div class="sidebar-group-title">审核管理</div>
      <div class="sidebar-item" onclick="navigateTo('cert-review.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>商家审核管理</div>
      <div class="sidebar-group-title">系统管理</div>
      <div class="sidebar-item" onclick="navigateTo('wallet-admin.html')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>钱包管理</div>
    </div>

    <!-- 右侧内容区 -->
    <div class="content">
      <div class="content-header">
        <div class="content-title">跳转路径设置</div>
        <button class="btn btn-primary" onclick="openPathModal()">添加路径</button>
      </div>

      <div class="card">
        <div class="card-title">路径列表</div>
        <div class="path-list" id="pathList">
          <!-- 路径将通过JS渲染 -->
        </div>
        <div class="empty-state" id="emptyPaths" style="display: none;">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="12 19 19 12 12 5 5 12"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
          <div class="empty-text">暂无跳转路径，请添加场景间的导航关系</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 添加路径弹窗 -->
  <div class="modal-overlay" id="pathModal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">添加跳转路径</div>
        <div class="modal-close" onclick="closePathModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">从图片</label>
          <select class="form-select" id="pathFrom">
            <option value="">请选择起始图片</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">跳转到图片</label>
          <select class="form-select" id="pathTo">
            <option value="">请选择目标图片</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">箭头区域</label>
          <div class="arrow-position-group">
            <div class="pos-row">
              <label class="pos-label">垂直位置</label>
              <div class="pos-buttons">
                <button class="pos-btn" onclick="setPathArrowPosition('v', 'top')">上</button>
                <button class="pos-btn" onclick="setPathArrowPosition('v', 'center')">中</button>
                <button class="pos-btn" onclick="setPathArrowPosition('v', 'bottom')">下</button>
              </div>
            </div>
            <div class="pos-row">
              <label class="pos-label">水平位置</label>
              <div class="pos-buttons">
                <button class="pos-btn" onclick="setPathArrowPosition('h', 'left')">左</button>
                <button class="pos-btn" onclick="setPathArrowPosition('h', 'center')">中</button>
                <button class="pos-btn" onclick="setPathArrowPosition('h', 'right')">右</button>
              </div>
            </div>
          </div>
          <input type="hidden" id="pathArrowV">
          <input type="hidden" id="pathArrowH">
        </div>
        <div class="form-group">
          <label class="form-label">箭头倾斜角度（默认朝上为0°）</label>
          <input class="form-input" id="pathArrowAngle" type="number" placeholder="输入角度，如：0（上）、90（右）、180（下）、270（左）" value="0">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closePathModal()">取消</button>
        <button class="btn btn-primary" onclick="savePath()">保存</button>
      </div>
    </div>
  </div>

  <script>
    var scenes = [
      { id: 'scene1', name: '食品区',
        images: [{ imgId: 'img_1', name: '食品区主图', src: '../scene1.png' }] },
      { id: 'scene2', name: '文旅区',
        images: [
          { imgId: 'img_1', name: '文旅区主图', src: '../scene2.png' },
          { imgId: 'img_2', name: '文旅区副图', src: '../scene1.png' }
        ] },
      { id: 'scene3', name: '影视区',
        images: [{ imgId: 'img_1', name: '影视区主图', src: '../scene3.png' }] }
    ];

    // paths: { id, fromScene, fromImg, toScene, toImg, arrowV, arrowH, arrowAngle }
    var paths = [];

    function navigateTo(url) { window.location.href = url; }

    // 辅助：根据sceneId+imgId查找名称
    function getImageLabel(sceneId, imgId) {
      var s = scenes.find(function(x) { return x.id === sceneId; });
      if (!s) return sceneId + '/' + imgId;
      var img = (s.images || []).find(function(x) { return x.imgId === imgId; });
      return s.name + (img ? ' / ' + img.name : '');
    }

    // 构建图片选项（optgroup分组）
    function buildImageOptions() {
      return scenes.reduce(function(html, s) {
        if (!s.images || s.images.length === 0) return html;
        html += '<optgroup label="' + s.name + '">';
        s.images.forEach(function(img) {
          html += '<option value="' + s.id + '|' + img.imgId + '">' + img.name + '</option>';
        });
        html += '</optgroup>';
        return html;
      }, '<option value="">请选择图片</option>');
    }

    function renderPathList() {
      var container = document.getElementById('pathList');
      var empty = document.getElementById('emptyPaths');
      if (paths.length === 0) { container.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      container.innerHTML = paths.map(function(p) {
        var fromLabel = getImageLabel(p.fromScene, p.fromImg);
        var toLabel = getImageLabel(p.toScene, p.toImg);
        var arrowV = p.arrowV ? getPositionLabel(p.arrowV) : '-';
        var arrowH = p.arrowH ? getPositionLabel(p.arrowH) : '-';
        return '<div class="path-item">' +
          '<div class="path-from">' + fromLabel + '</div>' +
          '<div class="path-arrow">→</div>' +
          '<div class="path-to">' + toLabel + '</div>' +
          '<div class="path-info">' + arrowV + arrowH + ' · ' + (p.arrowAngle || 0) + '°</div>' +
          '<div class="path-delete" onclick="deletePath(\'' + p.id + '\')">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div></div>';
      }).join('');
    }

    function getPositionLabel(pos) {
      var m = { top: '上', bottom: '下', left: '左', right: '右', center: '' };
      return m[pos] || '';
    }

    function openPathModal() {
      var opts = buildImageOptions();
      document.getElementById('pathFrom').innerHTML = opts;
      document.getElementById('pathTo').innerHTML = opts;
      document.getElementById('pathFrom').value = '';
      document.getElementById('pathTo').value = '';
      document.getElementById('pathArrowV').value = '';
      document.getElementById('pathArrowH').value = '';
      document.getElementById('pathArrowAngle').value = '0';
      document.querySelectorAll('.pos-btn').forEach(function(b) { b.classList.remove('active'); });
      document.getElementById('pathModal').classList.add('show');
    }

    function closePathModal() { document.getElementById('pathModal').classList.remove('show'); }

    function setPathArrowPosition(axis, pos) {
      if (axis === 'v') document.getElementById('pathArrowV').value = pos;
      else document.getElementById('pathArrowH').value = pos;
      var btns = document.querySelectorAll('.pos-buttons:nth-of-type(' + (axis === 'v' ? 1 : 2) + ') .pos-btn');
      btns.forEach(function(b) { b.classList.toggle('active', b.textContent === getPositionLabel(pos)); });
    }

    function savePath() {
      var fromVal = document.getElementById('pathFrom').value;
      var toVal = document.getElementById('pathTo').value;
      if (!fromVal || !toVal) { showToast('请选择起始和目标图片', 'error'); return; }
      if (fromVal === toVal) { showToast('起始和目标不能相同', 'error'); return; }
      var fp = fromVal.split('|'), tp = toVal.split('|');
      var fromScene = fp[0], fromImg = fp[1], toScene = tp[0], toImg = tp[1];
      var arrowV = document.getElementById('pathArrowV').value;
      var arrowH = document.getElementById('pathArrowH').value;
      var arrowAngle = parseInt(document.getElementById('pathArrowAngle').value) || 0;

      var exists = paths.some(function(p) {
        return p.fromScene === fromScene && p.fromImg === fromImg && p.toScene === toScene && p.toImg === toImg;
      });
      if (exists) { showToast('该路径已存在', 'error'); return; }

      paths.push({ id: 'path' + Date.now(), fromScene, fromImg, toScene, toImg, arrowV, arrowH, arrowAngle });
      showToast('路径添加成功', 'success');
      closePathModal();
      renderPathList();
    }

    function deletePath(id) {
      if (!confirm('确定删除？')) return;
      paths = paths.filter(function(p) { return p.id !== id; });
      showToast('已删除', 'success'); renderPathList();
    }

    function showToast(msg, type) {
      var t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg;
      document.body.appendChild(t); setTimeout(function() { t.remove(); }, 2000);
    }

    document.addEventListener('DOMContentLoaded', renderPathList);
  </script>
</body>
</html>
