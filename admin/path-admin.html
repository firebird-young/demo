<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>跳转路径 - 元宇宙商城后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }

    /* ── 顶部导航 ── */
    .header { background: linear-gradient(135deg, #D70C1F, #F12B3D); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-size: 18px; font-weight: 600; }
    .header-user { font-size: 14px; }

    /* ── 主布局 ── */
    .main-container { display: flex; min-height: calc(100vh - 60px); }

    /* ── 左侧菜单 ── */
    .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; padding: 16px 0; }
    .sidebar-group-title { padding: 8px 24px; font-size: 12px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .sidebar-item { padding: 10px 24px 10px 48px; font-size: 14px; color: #666; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .sidebar-item:hover { background: #f5f5f5; color: #D70C1F; }
    .sidebar-item.active { background: rgba(215, 12, 31, 0.1); color: #D70C1F; font-weight: 600; }
    .sidebar-item svg { width: 14px; height: 14px; }

    /* ── 右侧内容区 ── */
    .content { flex: 1; padding: 24px; overflow-y: auto; }
    .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .content-title { font-size: 18px; font-weight: 600; color: #1a1a2e; }
    .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: #D70C1F; color: #fff; }
    .btn-primary:hover { background: #c60a1b; }
    .btn-default { background: #fff; color: #666; border: 1px solid #ddd; }
    .btn-default:hover { background: #f5f5f5; }

    /* ── 卡片样式 ── */
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1a1a2e; }

    /* ── 表单样式 ── */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: #D70C1F; }
    .form-select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }

    /* ── 箭头位置选择 ── */
    .arrow-position-group { margin-top: 8px; }
    .pos-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .pos-row:last-child { margin-bottom: 0; }
    .pos-label { font-size: 12px; color: #666; width: 60px; }
    .pos-buttons { display: flex; gap: 8px; }
    .pos-btn { padding: 6px 16px; font-size: 12px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; }
    .pos-btn:hover { background: #f5f5f5; }
    .pos-btn.active { background: #D70C1F; color: #fff; border-color: #D70C1F; }

    /* ── 跳转路径设置 ── */
    .path-list { margin-top: 16px; }
    .path-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: #f9f9f9; border-radius: 8px; margin-bottom: 8px; }
    .path-from { flex: 1; font-size: 14px; color: #333; }
    .path-arrow { color: #999; }
    .path-to { flex: 1; font-size: 14px; color: #D70C1F; }
    .path-info { font-size: 12px; color: #999; }
    .path-delete { width: 28px; height: 28px; border-radius: 50%; background: #fff; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .path-delete svg { width: 14px; height: 14px; color: #999; }

    /* ── 模态框 ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close { width: 28px; height: 28px; border-radius: 50%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .modal-close svg { width: 14px; height: 14px; color: #666; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 12px; }

    /* ── 空状态 ── */
    .empty-state { padding: 60px 0; text-align: center; }
    .empty-icon { width: 64px; height: 64px; margin: 0 auto 16px; background: #f5f5f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .empty-icon svg { width: 32px; height: 32px; color: #ccc; }
    .empty-text { font-size: 14px; color: #999; }

    /* ── 提示信息 ── */
    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 2000; animation: slideIn 0.3s ease; }
    .toast.success { background: rgba(7, 193, 96, 0.9); color: #fff; }
    .toast.error { background: rgba(215, 12, 31, 0.9); color: #fff; }
    @keyframes slideIn { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <div class="header">
    <div class="header-title">元宇宙商城 - 后台管理</div>
    <div class="header-user">管理员</div>
  </div>

  <!-- 主布局 -->
  <div class="main-container">
    <!-- 左侧菜单 -->
    <div class="sidebar">
      <div class="sidebar-group-title">元宇宙管理</div>
      <div class="sidebar-item" onclick="navigateTo('scene-admin.html')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        场景管理
      </div>
      <div class="sidebar-item" onclick="navigateTo('hotspot-admin.html')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg>
        热区标注
      </div>
      <div class="sidebar-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="12 19 19 12 12 5 5 12"/><circle cx="12" cy="12" r="3"/></svg>
        跳转路径
      </div>
    </div>

    <!-- 右侧内容区 -->
    <div class="content">
      <div class="content-header">
        <div class="content-title">跳转路径设置</div>
        <button class="btn btn-primary" onclick="openPathModal()">添加路径</button>
      </div>

      <div class="card">
        <div class="card-title">路径列表</div>
        <div class="path-list" id="pathList">
          <!-- 路径将通过JS渲染 -->
        </div>
        <div class="empty-state" id="emptyPaths" style="display: none;">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="12 19 19 12 12 5 5 12"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
          <div class="empty-text">暂无跳转路径，请添加场景间的导航关系</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 添加路径弹窗 -->
  <div class="modal-overlay" id="pathModal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title">添加跳转路径</div>
        <div class="modal-close" onclick="closePathModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">从场景</label>
          <select class="form-select" id="pathFrom">
            <option value="">请选择起始场景</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">跳转到场景</label>
          <select class="form-select" id="pathTo">
            <option value="">请选择目标场景</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">箭头区域</label>
          <div class="arrow-position-group">
            <div class="pos-row">
              <label class="pos-label">垂直位置</label>
              <div class="pos-buttons">
                <button class="pos-btn" onclick="setPathArrowPosition('v', 'top')">上</button>
                <button class="pos-btn" onclick="setPathArrowPosition('v', 'center')">中</button>
                <button class="pos-btn" onclick="setPathArrowPosition('v', 'bottom')">下</button>
              </div>
            </div>
            <div class="pos-row">
              <label class="pos-label">水平位置</label>
              <div class="pos-buttons">
                <button class="pos-btn" onclick="setPathArrowPosition('h', 'left')">左</button>
                <button class="pos-btn" onclick="setPathArrowPosition('h', 'center')">中</button>
                <button class="pos-btn" onclick="setPathArrowPosition('h', 'right')">右</button>
              </div>
            </div>
          </div>
          <input type="hidden" id="pathArrowV">
          <input type="hidden" id="pathArrowH">
        </div>
        <div class="form-group">
          <label class="form-label">箭头倾斜角度（默认朝上为0°）</label>
          <input class="form-input" id="pathArrowAngle" type="number" placeholder="输入角度，如：0（上）、90（右）、180（下）、270（左）" value="0">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closePathModal()">取消</button>
        <button class="btn btn-primary" onclick="savePath()">保存</button>
      </div>
    </div>
  </div>

  <script>
    // 场景数据
    let scenes = [
      { id: 'scene1', name: '食品区', desc: '食品区场景', image: '../scene1.png', hotspots: [] },
      { id: 'scene2', name: '文旅区', desc: '文旅区场景', image: '../scene2.png', hotspots: [] },
      { id: 'scene3', name: '影视区', desc: '影视区场景', image: '../scene3.png', hotspots: [] }
    ];

    // 路径数据
    let paths = [];

    // 导航
    function navigateTo(url) {
      window.location.href = url;
    }

    // 渲染路径列表
    function renderPathList() {
      const container = document.getElementById('pathList');
      const emptyState = document.getElementById('emptyPaths');
      
      if (paths.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }
      
      emptyState.style.display = 'none';
      container.innerHTML = paths.map(path => {
        const fromScene = scenes.find(s => s.id === path.from);
        const toScene = scenes.find(s => s.id === path.to);
        const arrowV = path.arrowV ? getPositionLabel(path.arrowV) : '-';
        const arrowH = path.arrowH ? getPositionLabel(path.arrowH) : '-';
        const angle = path.arrowAngle !== undefined ? path.arrowAngle + '°' : '0°';
        return `
          <div class="path-item">
            <div class="path-from">${fromScene?.name || path.from}</div>
            <div class="path-arrow">→</div>
            <div class="path-to">${toScene?.name || path.to}</div>
            <div class="path-info">${arrowV}${arrowH} · ${angle}</div>
            <div class="path-delete" onclick="deletePath('${path.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </div>
          </div>
        `;
      }).join('');
    }

    // 获取位置标签
    function getPositionLabel(pos) {
      const labels = { top: '上', bottom: '下', left: '左', right: '右', center: '' };
      return labels[pos] || '';
    }

    // 打开路径弹窗
    function openPathModal() {
      const fromSelect = document.getElementById('pathFrom');
      const toSelect = document.getElementById('pathTo');
      
      fromSelect.innerHTML = '<option value="">请选择起始场景</option>' + 
        scenes.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
      
      toSelect.innerHTML = '<option value="">请选择目标场景</option>' + 
        scenes.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
      
      document.getElementById('pathArrowV').value = '';
      document.getElementById('pathArrowH').value = '';
      document.getElementById('pathArrowAngle').value = '0';
      
      document.querySelectorAll('.pos-btn').forEach(btn => btn.classList.remove('active'));
      
      document.getElementById('pathModal').classList.add('show');
    }

    // 关闭路径弹窗
    function closePathModal() {
      document.getElementById('pathModal').classList.remove('show');
    }

    // 设置箭头位置
    function setPathArrowPosition(axis, position) {
      if (axis === 'v') {
        document.getElementById('pathArrowV').value = position;
      } else {
        document.getElementById('pathArrowH').value = position;
      }
      
      const buttons = document.querySelectorAll(`.pos-buttons:nth-of-type(${axis === 'v' ? 1 : 2}) .pos-btn`);
      buttons.forEach(btn => btn.classList.toggle('active', btn.textContent === getPositionLabel(position)));
    }

    // 保存路径
    function savePath() {
      const from = document.getElementById('pathFrom').value;
      const to = document.getElementById('pathTo').value;
      const arrowV = document.getElementById('pathArrowV').value;
      const arrowH = document.getElementById('pathArrowH').value;
      const arrowAngle = parseInt(document.getElementById('pathArrowAngle').value) || 0;

      if (!from || !to) {
        showToast('请选择起始场景和目标场景', 'error');
        return;
      }

      if (from === to) {
        showToast('起始场景和目标场景不能相同', 'error');
        return;
      }

      const exists = paths.some(p => p.from === from && p.to === to);
      if (exists) {
        showToast('该路径已存在', 'error');
        return;
      }

      paths.push({
        id: 'path' + Date.now(),
        from,
        to,
        arrowV,
        arrowH,
        arrowAngle
      });

      showToast('路径添加成功', 'success');
      closePathModal();
      renderPathList();
    }

    // 删除路径
    function deletePath(id) {
      if (confirm('确定要删除这条路径吗？')) {
        paths = paths.filter(p => p.id !== id);
        showToast('路径删除成功', 'success');
        renderPathList();
      }
    }

    // 显示提示
    function showToast(message, type) {
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 2000);
    }

    document.addEventListener('DOMContentLoaded', renderPathList);
  </script>
</body>
</html>
