<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>商家管理 - 元宇宙商城后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }

    /* ── 顶部导航 ── */
    .header { background: linear-gradient(135deg, #D70C1F, #F12B3D); color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-size: 18px; font-weight: 600; }
    .header-user { font-size: 14px; }

    /* ── 主布局 ── */
    .main-container { display: flex; min-height: calc(100vh - 60px); }

    /* ── 左侧菜单 ── */
    .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; padding: 16px 0; }
    .sidebar-group-title { padding: 8px 24px; font-size: 12px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .sidebar-item { padding: 10px 24px 10px 48px; font-size: 14px; color: #666; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .sidebar-item:hover { background: #f5f5f5; color: #D70C1F; }
    .sidebar-item.active { background: rgba(215, 12, 31, 0.1); color: #D70C1F; font-weight: 600; }
    .sidebar-item svg { width: 14px; height: 14px; }

    /* ── 右侧内容区 ── */
    .content { flex: 1; padding: 24px; overflow-y: auto; }
    .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .content-title { font-size: 18px; font-weight: 600; color: #1a1a2e; }
    .btn { padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: #D70C1F; color: #fff; }
    .btn-primary:hover { background: #c60a1b; }
    .btn-default { background: #fff; color: #666; border: 1px solid #ddd; }
    .btn-default:hover { background: #f5f5f5; }

    /* ── 卡片样式 ── */
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1a1a2e; }

    /* ── 表单样式 ── */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: #D70C1F; }
    .form-select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
    .form-textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; min-height: 80px; resize: vertical; }

    /* ── 商家列表 ── */
    .merchant-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .merchant-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; transition: transform 0.2s; }
    .merchant-card:hover { transform: translateY(-4px); }
    .merchant-cover { width: 100%; height: 120px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #D70C1F, #F12B3D); }
    .merchant-cover svg { width: 32px; height: 32px; color: #fff; }
    .merchant-info { padding: 12px; }
    .merchant-name { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
    .merchant-tag { font-size: 12px; color: #999; }
    .merchant-actions { display: flex; gap: 8px; margin-top: 10px; }
    .merchant-btn { flex: 1; padding: 6px; font-size: 12px; border-radius: 4px; border: none; cursor: pointer; }
    .merchant-btn.edit { background: #f5f5f5; color: #666; }
    .merchant-btn.delete { background: #fff5f5; color: #D70C1F; }

    /* ── 模态框 ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close { width: 28px; height: 28px; border-radius: 50%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .modal-close svg { width: 14px; height: 14px; color: #666; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 12px; }

    /* ── 空状态 ── */
    .empty-state { padding: 60px 0; text-align: center; }
    .empty-icon { width: 64px; height: 64px; margin: 0 auto 16px; background: #f5f5f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .empty-icon svg { width: 32px; height: 32px; color: #ccc; }
    .empty-text { font-size: 14px; color: #999; }

    /* ── 提示信息 ── */
    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 2000; animation: slideIn 0.3s ease; }
    .toast.success { background: rgba(7, 193, 96, 0.9); color: #fff; }
    .toast.error { background: rgba(215, 12, 31, 0.9); color: #fff; }
    @keyframes slideIn { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <div class="header">
    <div class="header-title">元宇宙商城 - 后台管理</div>
    <div class="header-user">管理员</div>
  </div>

  <!-- 主布局 -->
  <div class="main-container">
    <!-- 左侧菜单 -->
    <div class="sidebar">
      <div class="sidebar-group-title">会员管理</div>
      <div class="sidebar-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        商家管理
      </div>
    </div>

    <!-- 右侧内容区 -->
    <div class="content">
      <div class="content-header">
        <div class="content-title">商家管理</div>
        <button class="btn btn-primary" onclick="openAddMerchantModal()">添加商家</button>
      </div>

      <div class="card">
        <div class="card-title">商家列表</div>
        <div class="merchant-list" id="merchantList">
          <!-- 商家卡片将通过JS渲染 -->
        </div>
        <div class="empty-state" id="emptyMerchants" style="display: none;">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div class="empty-text">暂无商家，请添加商家信息</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 添加商家弹窗 -->
  <div class="modal-overlay" id="addMerchantModal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title" id="merchantModalTitle">添加商家</div>
        <div class="modal-close" onclick="closeAddMerchantModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>
      <div class="modal-body">
        <input type="hidden" id="merchantEditId">
        <div class="form-group">
          <label class="form-label">商家名称</label>
          <input class="form-input" id="merchantNameInput" placeholder="输入商家名称">
        </div>
        <div class="form-group">
          <label class="form-label">商家分类</label>
          <select class="form-select" id="merchantTypeInput">
            <option value="food">食品</option>
            <option value="tour">文旅</option>
            <option value="film">影视</option>
            <option value="ent">娱乐</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">商家标签</label>
          <input class="form-input" id="merchantTagInput" placeholder="输入商家标签，如：品牌馆 · 数字珍藏">
        </div>
        <div class="form-group">
          <label class="form-label">商家描述</label>
          <textarea class="form-textarea" id="merchantDescInput" placeholder="输入商家描述"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeAddMerchantModal()">取消</button>
        <button class="btn btn-primary" onclick="saveMerchant()">保存</button>
      </div>
    </div>
  </div>

  <script>
    // 商家数据
    let merchants = [
      { id: 'm1', name: '贵州茅台', type: 'food', tag: '数字酒庄 · 品牌馆', desc: '茅台酒起源于秦汉，成熟于明清，1915年巴拿马万国博览会金奖' },
      { id: 'm2', name: '王者荣耀', type: 'ent', tag: '游戏资产 · 数字皮肤', desc: '全球领先的MOBA手游，拥有海量英雄与皮肤数字资产' },
      { id: 'm3', name: '五粮液', type: 'food', tag: '品牌馆 · 数字珍藏', desc: '中国浓香型白酒的典型代表，以五粮酿造工艺闻名' },
      { id: 'm4', name: '妙可蓝多', type: 'food', tag: '新零售 · 品牌馆', desc: '中国领先的奶酪品牌，布局数字化新零售' },
      { id: 'm5', name: '杜甫草堂', type: 'tour', tag: '文旅 · 数字藏品', desc: '中国唐代大诗人杜甫流寓成都时的故居' },
      { id: 'm6', name: '海底捞', type: 'food', tag: '餐饮 · 会员数字卡', desc: '中国领先的餐饮服务品牌，以极致服务体验著称' },
      { id: 'm7', name: '鬼吹灯', type: 'film', tag: '影视 · 数字资产', desc: '经典盗墓题材IP，推出摸金校尉系列数字藏品' },
      { id: 'm8', name: '三体', type: 'film', tag: '影视 · 数字资产', desc: '刘慈欣科幻巨著IP，推出三体文明系列数字资产' }
    ];

    // 导航
    function navigateTo(url) {
      window.location.href = url;
    }

    // 渲染商家列表
    function renderMerchantList() {
      const container = document.getElementById('merchantList');
      const emptyState = document.getElementById('emptyMerchants');
      
      if (merchants.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }
      
      emptyState.style.display = 'none';
      container.innerHTML = merchants.map(merchant => `
        <div class="merchant-card">
          <div class="merchant-cover">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div class="merchant-info">
            <div class="merchant-name">${merchant.name}</div>
            <div class="merchant-tag">${merchant.tag}</div>
            <div class="merchant-actions">
              <button class="merchant-btn edit" onclick="editMerchant('${merchant.id}')">编辑</button>
              <button class="merchant-btn delete" onclick="deleteMerchant('${merchant.id}')">删除</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 打开添加商家弹窗
    function openAddMerchantModal() {
      document.getElementById('merchantModalTitle').textContent = '添加商家';
      document.getElementById('merchantEditId').value = '';
      document.getElementById('merchantNameInput').value = '';
      document.getElementById('merchantTypeInput').value = 'food';
      document.getElementById('merchantTagInput').value = '';
      document.getElementById('merchantDescInput').value = '';
      document.getElementById('addMerchantModal').classList.add('show');
    }

    // 关闭添加商家弹窗
    function closeAddMerchantModal() {
      document.getElementById('addMerchantModal').classList.remove('show');
    }

    // 编辑商家
    function editMerchant(id) {
      const merchant = merchants.find(m => m.id === id);
      if (merchant) {
        document.getElementById('merchantModalTitle').textContent = '编辑商家';
        document.getElementById('merchantEditId').value = id;
        document.getElementById('merchantNameInput').value = merchant.name;
        document.getElementById('merchantTypeInput').value = merchant.type;
        document.getElementById('merchantTagInput').value = merchant.tag;
        document.getElementById('merchantDescInput').value = merchant.desc;
        document.getElementById('addMerchantModal').classList.add('show');
      }
    }

    // 保存商家
    function saveMerchant() {
      const id = document.getElementById('merchantEditId').value;
      const name = document.getElementById('merchantNameInput').value.trim();
      const type = document.getElementById('merchantTypeInput').value;
      const tag = document.getElementById('merchantTagInput').value.trim();
      const desc = document.getElementById('merchantDescInput').value.trim();

      if (!name) {
        showToast('请输入商家名称', 'error');
        return;
      }

      if (id) {
        // 编辑
        const merchant = merchants.find(m => m.id === id);
        if (merchant) {
          merchant.name = name;
          merchant.type = type;
          merchant.tag = tag;
          merchant.desc = desc;
        }
        showToast('商家修改成功', 'success');
      } else {
        // 新增
        merchants.push({
          id: 'm' + Date.now(),
          name,
          type,
          tag: tag || '未分类',
          desc: desc || '暂无描述'
        });
        showToast('商家添加成功', 'success');
      }

      closeAddMerchantModal();
      renderMerchantList();
    }

    // 删除商家
    function deleteMerchant(id) {
      if (confirm('确定要删除这个商家吗？')) {
        merchants = merchants.filter(m => m.id !== id);
        showToast('商家删除成功', 'success');
        renderMerchantList();
      }
    }

    // 显示提示
    function showToast(message, type) {
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 2000);
    }

    // 页面加载完成后渲染商家列表
    document.addEventListener('DOMContentLoaded', renderMerchantList);
  </script>
</body>
</html>
