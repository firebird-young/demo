<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>商家地图点位 - 赛博朋克版</title>
  <style>
    :root{--bg:#0a0a1a;--card:#121226;--card2:#1a1a35;--txt:#fff;--txt2:#b8b8d0;--txt3:#8888a0;--pri:#6c63ff;--sec:#00d4ff;--accent:#ff6b6b;--shadow:0 4px 20px rgba(0,0,0,.4)}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
      background:#fff;
      color:var(--txt);overflow:hidden;
      display:flex;align-items:center;justify-content:center;
      height:100vh;width:100vw
    }
    /* 手机外壳 */
    .phone-frame{
      width:100vw;height:100vh;
      max-width:420px;max-height:932px;
      position:relative;overflow:hidden;
      background:var(--bg);
      box-shadow:0 0 0 1px rgba(0,212,255,.15),
                 0 20px 80px rgba(0,0,0,.8),
                 0 0 40px rgba(108,99,255,.1);
      border-radius:0;
    }
    @media(min-width:500px){
      .phone-frame{border-radius:40px;max-height:850px}
      body{padding:20px}
    }

    .page{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column}
    .page.active{display:flex}

    /* ===== 状态栏 ===== */
    .status-bar{
      height:44px;flex-shrink:0;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;
      background:rgba(10,10,26,.6);backdrop-filter:blur(10px);
      z-index:300;font-size:11px;color:var(--txt3);
      border-bottom:1px solid rgba(0,212,255,.05);
    }
    .status-bar .time{font-weight:600}
    .status-icons{display:flex;gap:6px;font-size:12px}

    /* 地图页面 */
    .map-wrapper{flex:1;position:relative;overflow:hidden;touch-action:none}
    .map-container{width:100%;height:100%;position:relative;background:var(--bg);overflow:hidden}
    .map-image{width:100%;height:100%;object-fit:contain;background:#0a0a1a;display:block;pointer-events:none}
    
    /* 缩放容器 - 图片与标记一起缩放 */
    .map-zoom-wrap{
      position:absolute;top:0;left:0;width:100%;height:100%;
      transform-origin:0 0;
      will-change:transform;
    }
    /* 标记层跟随缩放 */
    #markersLayer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
    .biz-marker{pointer-events:auto}

    /* 缩放控件 */
    .zoom-controls{
      position:absolute;right:12px;bottom:50px;z-index:150;
      display:flex;flex-direction:column;gap:2px
    }
    .zoom-btn{
      width:40px;height:40px;border:none;border-radius:10px;
      background:rgba(10,10,26,.8);backdrop-filter:blur(8px);
      color:var(--sec);font-size:20px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      border:1px solid rgba(0,212,255,.2);
      transition:all .2s;
      -webkit-backdrop-filter:blur(8px)
    }
    .zoom-btn:active{background:rgba(108,99,255,.3)}
    .zoom-level{
      text-align:center;font-size:10px;color:rgba(255,255,255,.4);
      padding:2px 0;user-select:none
    }
    
    /* 3D倾斜 */
    .map-3d-mode .map-container{perspective:1200px}
    .map-3d-mode .map-image{transform:rotateX(30deg) scale(0.9);transform-origin:center center;transition:transform .5s ease}

    /* 商家标记 */
    .biz-marker{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:100}
    .pulse-marker{position:relative;width:36px;height:36px;display:flex;align-items:center;justify-content:center}
    .pulse-ring{position:absolute;width:36px;height:36px;border-radius:50%;border:3px solid var(--pri);animation:pulse 2s ease-out infinite;opacity:0}
    .pulse-ring:nth-child(2){animation-delay:.5s}
    .pulse-dot{width:14px;height:14px;border-radius:50%;background:var(--pri);box-shadow:0 0 20px var(--pri);z-index:2}
    .marker-label{position:absolute;top:-26px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10px;color:var(--sec);text-shadow:0 0 10px var(--sec);font-weight:500;background:rgba(10,10,26,.85);padding:2px 8px;border-radius:8px;border:1px solid rgba(0,212,255,.3)}
    @keyframes pulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.5);opacity:0}}

    .marker-chengdu .pulse-ring{border-color:#6c63ff}
    .marker-chengdu .pulse-dot{background:#6c63ff;box-shadow:0 0 20px #6c63ff}
    .marker-chengdu .marker-label{color:#6c63ff;text-shadow:0 0 10px #6c63ff;border-color:rgba(108,99,255,.3)}
    .marker-luzhou .pulse-ring{border-color:#00d4ff}
    .marker-luzhou .pulse-dot{background:#00d4ff;box-shadow:0 0 20px #00d4ff}
    .marker-luzhou .marker-label{color:#00d4ff;text-shadow:0 0 10px #00d4ff;border-color:rgba(0,212,255,.3)}
    .marker-xichang .pulse-ring{border-color:#ff6b6b}
    .marker-xichang .pulse-dot{background:#ff6b6b;box-shadow:0 0 20px #ff6b6b}
    .marker-xichang .marker-label{color:#ff6b6b;text-shadow:0 0 10px #ff6b6b;border-color:rgba(255,107,107,.3)}

    /* 弹窗 */
    .popup{position:absolute;left:50%!important;top:auto!important;bottom:100px;transform:translateX(-50%);width:calc(100% - 32px);max-width:360px;background:rgba(18,18,38,.96);border:1px solid rgba(0,212,255,.3);border-radius:16px;padding:16px;box-shadow:0 8px 40px rgba(0,0,0,.6),0 0 20px rgba(108,99,255,.1);backdrop-filter:blur(10px);z-index:200;display:none;animation:popUp .35s ease}
    .popup.show{display:block}
    @keyframes popUp{from{opacity:0;transform:translateX(-50%) translateY(20px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
    .popup .pop-cover{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;background:var(--card2);margin-bottom:8px}
    .popup .pop-name{font-size:15px;font-weight:600;margin-bottom:2px}
    .popup .pop-city{font-size:11px;color:var(--sec);margin-bottom:6px}
    .popup .pop-desc{font-size:12px;color:var(--txt2);line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .popup .pop-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
    .popup .pop-tag{font-size:10px;color:var(--txt3);background:rgba(108,99,255,.15);padding:2px 8px;border-radius:6px}
    .popup .pop-btn{width:100%;padding:10px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--pri),var(--sec));color:#fff;font-size:14px;font-weight:500;cursor:pointer}

    /* 侧边栏 - 底部滑出 */
    .sidebar{
      position:absolute;bottom:0;left:0;right:0;max-height:65vh;
      background:rgba(10,10,26,.96);backdrop-filter:blur(20px);
      border-radius:20px 20px 0 0;
      border-top:1px solid rgba(0,212,255,.2);
      box-shadow:0 -4px 30px rgba(108,99,255,.1);
      z-index:300;
      transform:translateY(100%);transition:transform .35s cubic-bezier(0.4,0,0.2,1);
      display:flex;flex-direction:column
    }
    .sidebar.open{transform:translateY(0)}

    .sb-handle{width:36px;height:4px;border-radius:2px;background:rgba(0,212,255,.3);margin:8px auto;flex-shrink:0}
    .sb-hdr{padding:0 16px 10px;border-bottom:1px solid rgba(0,212,255,.1);flex-shrink:0}
    .sb-title{font-size:16px;font-weight:600;margin-bottom:10px}
    .sb-search{position:relative}
    .sb-search input{width:100%;padding:10px 12px 10px 32px;border:1px solid rgba(0,212,255,.2);border-radius:10px;background:rgba(255,255,255,.05);color:var(--txt);font-size:13px;outline:none}
    .sb-search input::placeholder{color:var(--txt3)}
    .sb-search::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.5}
    .sb-list{flex:1;overflow-y:auto;padding:4px 0;padding-bottom:calc(20px + env(safe-area-inset-bottom,10px))}
    .sb-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .2s;border-bottom:1px solid rgba(0,212,255,.04)}
    .sb-item:active{background:rgba(108,99,255,.12)}
    .sb-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--card2);flex-shrink:0;border:1px solid rgba(108,99,255,.2)}
    .sb-info{flex:1;min-width:0}
    .sb-name{font-size:13px;font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sb-meta{font-size:11px;color:var(--txt3)}

    /* 顶部导航栏 */
    .nav-bar{
      position:absolute;top:44px;left:0;right:0;
      height:52px;padding:0 16px;
      display:flex;align-items:center;justify-content:space-between;
      z-index:250;pointer-events:none
    }
    .nav-bar>*{pointer-events:auto}
    .nav-title{font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--pri),var(--sec));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none}
    .nav-actions{display:flex;gap:8px}
    .btn-icon{
      width:38px;height:38px;border-radius:10px;
      border:1px solid rgba(0,212,255,.25);
      background:rgba(10,10,26,.75);backdrop-filter:blur(8px);
      color:var(--txt);display:flex;align-items:center;justify-content:center;
      cursor:pointer;font-size:15px;transition:all .2s
    }
    .btn-icon:active{background:rgba(108,99,255,.25)}
    .btn-icon.active{background:rgba(108,99,255,.25);border-color:var(--pri)}

    /* 地图切换滑块 */
    .map-swiper{
      position:absolute;top:96px;left:0;right:0;z-index:240;
      padding:0 16px;display:flex;gap:8px;overflow-x:auto;
      scrollbar-width:none;pointer-events:none
    }
    .map-swiper::-webkit-scrollbar{display:none}
    .map-swiper>*{pointer-events:auto}
    .map-tab{
      flex-shrink:0;padding:6px 14px;border-radius:16px;
      border:1px solid rgba(0,212,255,.25);
      background:rgba(10,10,26,.75);backdrop-filter:blur(8px);
      color:var(--txt2);font-size:13px;cursor:pointer;
      transition:all .2s;display:flex;align-items:center;gap:6px;
      white-space:nowrap
    }
    .map-tab.active{background:rgba(108,99,255,.3);border-color:var(--pri);color:var(--txt);box-shadow:0 0 12px rgba(108,99,255,.2)}
    .map-tab .tab-icon{font-size:16px}

    /* 坐标调整模式 */
    .edit-mode{ cursor:crosshair }
    .edit-mode .biz-marker{ cursor:grab }
    .edit-mode .biz-marker.dragging{ cursor:grabbing;z-index:500 }
    .coord-tag{
      position:absolute;left:50%;bottom:-22px;transform:translateX(-50%);
      font-size:9px;color:#00d4ff;background:rgba(10,10,26,.85);
      padding:1px 6px;border-radius:6px;white-space:nowrap;pointer-events:none;
      border:1px solid rgba(0,212,255,.3);display:none;font-family:monospace
    }
    .edit-mode .coord-tag{display:block}
    .coord-panel{
      position:absolute;top:96px;left:50%;transform:translateX(-50%);
      background:rgba(10,10,26,.92);backdrop-filter:blur(12px);
      border:1px solid rgba(0,212,255,.3);border-radius:12px;
      padding:10px 14px;z-index:260;min-width:220px;
      text-align:center;font-size:11px;color:var(--txt2);
      display:none;box-shadow:0 8px 32px rgba(0,0,0,.5)
    }
    .coord-panel.show{display:block}
    .coord-panel .cp-title{font-size:13px;font-weight:600;color:var(--sec);margin-bottom:6px}
    .coord-panel .cp-item{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(0,212,255,.06)}
    .coord-panel .cp-item:last-child{border-bottom:none}
    .coord-panel .cp-name{color:var(--txt)}
    .coord-panel .cp-coord{color:var(--txt3);font-family:monospace}
    .cp-export{display:block;width:100%;margin-top:8px;padding:8px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--pri),var(--sec));color:#fff;font-size:12px;font-weight:500;cursor:pointer}
    .cp-export:active{transform:scale(.97)}
    .cp-copied{font-size:10px;color:var(--sec);text-align:center;margin-top:4px;display:none}

    /* 底部提示 */
    .map-hint{
      position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
      font-size:10px;color:rgba(255,255,255,.3);
      background:rgba(10,10,26,.6);backdrop-filter:blur(8px);
      padding:4px 14px;border-radius:16px;z-index:100;
      letter-spacing:1px;pointer-events:none
    }

    /* ===== 商家空间 ===== */
    .business-scroll{flex:1;overflow-y:auto;padding-bottom:calc(30px + env(safe-area-inset-bottom,10px))}
    .biz-header{background:linear-gradient(135deg,rgba(108,99,255,.15),rgba(0,212,255,.08));padding:16px 16px 20px;position:relative}
    .biz-btn-back{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--txt2);cursor:pointer;margin-bottom:10px}
    .biz-cover{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;background:rgba(255,255,255,.08);margin-bottom:10px}
    .biz-title{font-size:19px;font-weight:600;margin-bottom:4px}
    .biz-desc{font-size:12px;color:var(--txt2);line-height:1.5}
    .sec-title{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 10px}
    .sec-title h3{font-size:15px;font-weight:600}
    .sec-title .ml{font-size:12px;color:var(--pri);cursor:pointer}
    .f-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px}
    .f-card{background:var(--card);border:1px solid rgba(0,212,255,.08);border-radius:14px;padding:14px;cursor:pointer;transition:all .2s}
    .f-card:active{transform:scale(.97);border-color:var(--pri)}
    .fi{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;background:linear-gradient(135deg,rgba(108,99,255,.2),rgba(0,212,255,.1));margin-bottom:8px}
    .fn{font-size:13px;font-weight:500;margin-bottom:2px}
    .fd{font-size:11px;color:var(--txt3);line-height:1.3}

    /* 数字人对话 */
    .digi-section{margin:0 16px 8px;background:linear-gradient(180deg,rgba(108,99,255,.08),rgba(0,212,255,.04));border:1px solid rgba(0,212,255,.12);border-radius:16px;padding:16px;position:relative;overflow:hidden}
    .digi-section::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(108,99,255,.05),transparent 60%);pointer-events:none}
    .digi-hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px;position:relative}
    .digi-avatar{width:56px;height:56px;border-radius:50%;overflow:hidden;border:2px solid rgba(0,212,255,.3);flex-shrink:0;background:var(--card)}
    .digi-avatar img{width:100%;height:100%;object-fit:cover}
    .digi-info{flex:1}
    .digi-name{font-size:15px;font-weight:600}
    .digi-status{font-size:10px;color:var(--sec);display:flex;align-items:center;gap:4px}
    .digi-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--sec);animation:digiPulse 1.5s ease-in-out infinite}
    @keyframes digiPulse{0%,100%{opacity:1}50%{opacity:.3}}
    .digi-chat{background:rgba(10,10,26,.5);border-radius:12px;padding:12px;max-height:180px;overflow-y:auto;margin-bottom:10px;position:relative}
    .digi-msg{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}
    .digi-msg:last-child{margin-bottom:0}
    .digi-msg .dm-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1px solid rgba(0,212,255,.2)}
    .digi-msg .dm-avatar img{width:100%;height:100%;object-fit:cover}
    .digi-msg .dm-bubble{background:var(--card);border-radius:4px 12px 12px 12px;padding:8px 12px;font-size:12px;line-height:1.5;max-width:calc(100% - 36px);color:var(--txt2)}
    .digi-msg.dm-user{flex-direction:row-reverse}
    .digi-msg.dm-user .dm-bubble{background:rgba(108,99,255,.2);border-radius:12px 4px 12px 12px;color:var(--txt)}
    .digi-input{display:flex;gap:8px;position:relative}
    .digi-input input{flex:1;padding:10px 12px;border:1px solid rgba(0,212,255,.15);border-radius:10px;background:rgba(10,10,26,.6);color:var(--txt);font-size:12px;outline:none}
    .digi-input input::placeholder{color:var(--txt3)}
    .digi-input input:focus{border-color:var(--pri)}
    .digi-input .digi-send{width:40px;height:40px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--pri),var(--sec));color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .digi-input .digi-send:active{transform:scale(.93)}

    .f-prods{display:flex;gap:10px;overflow-x:auto;padding:0 16px 16px;scrollbar-width:none}
    .f-prods::-webkit-scrollbar{display:none}
    .f-p-card{flex-shrink:0;width:110px;background:var(--card);border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid rgba(0,212,255,.08)}
    .f-p-card:active{transform:scale(.97)}
    .pi{height:80px;display:flex;align-items:center;justify-content:center;font-size:36px}
    .pib{padding:8px 10px}
    .pn{font-size:11px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .pp{font-size:12px;font-weight:600;color:var(--pri)}

    /* 商品列表 */
    .pl-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(0,212,255,.08);flex-shrink:0}
    .pl-hdr h2{flex:1;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bb{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--card);cursor:pointer;flex-shrink:0}
    .bb:active{background:var(--card2)}
    .ci{position:relative;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--card);cursor:pointer;flex-shrink:0}
    .cart-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;border-radius:8px;background:var(--accent);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:600}
    .p-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px 16px;flex:1;align-content:start;overflow-y:auto}
    .p-card{background:var(--card);border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid rgba(0,212,255,.08)}
    .p-card:active{transform:scale(.97)}
    .pi-big{height:120px;display:flex;align-items:center;justify-content:center;font-size:50px}
    .pbody{padding:10px}
    .pn2{font-size:13px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .pp2{font-size:14px;font-weight:600;color:var(--pri)}

    /* 商品详情 */
    .pd-detail{flex:1;overflow-y:auto}
    .pd-hdr{height:220px;display:flex;align-items:center;justify-content:center;position:relative}
    .pd-back,.pd-cart-btn{position:absolute;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(0,0,0,.4);color:#fff;cursor:pointer;backdrop-filter:blur(8px)}
    .pd-back{left:12px;top:12px}.pd-cart-btn{right:12px;top:12px}
    .pd-info{padding:16px}
    .pd-name{font-size:18px;font-weight:600;margin-bottom:6px}
    .pd-price{font-size:22px;font-weight:700;color:var(--pri);margin-bottom:14px}
    .pd-st{font-size:12px;color:var(--txt3);margin-bottom:8px}
    .pd-specs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .pd-spec{padding:6px 14px;border:1px solid rgba(255,255,255,.12);border-radius:18px;background:rgba(255,255,255,.04);color:var(--txt2);font-size:12px;cursor:pointer;transition:all .2s}
    .pd-spec.selected{border-color:var(--pri);background:rgba(108,99,255,.15);color:var(--txt)}
    .pd-desc{font-size:13px;color:var(--txt2);line-height:1.7;padding-bottom:20px}
    .buy-bar{display:flex;gap:10px;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,8px));border-top:1px solid rgba(0,212,255,.08);background:var(--card);flex-shrink:0}
    .bb2,.bbb{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer}
    .bb2{background:var(--card2);color:var(--txt)}
    .bbb{background:linear-gradient(135deg,var(--pri),var(--sec));color:#fff}
    .bb2:active,.bbb:active{transform:scale(.97)}

    /* 购物车 */
    .cart-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(0,212,255,.08);flex-shrink:0}

  function updateStatusTime(){
    const d=new Date();

  function initSwiper(){

      return '<div class="map-tab" data-map="'+id+'" onclick="switchMap(\''+id+'\')"><span class="tab-icon">'+m.icon+'</span>'+m.label+'</div>';
    }).join('');
  }

  function switchMap(id){
    const m=mapsData[id];
    if(!m)return;
    activeMapId=id;
    businesses=m.businesses;
    cityPositions=m.positions;
    // 更新tab高亮
    document.querySelectorAll('.map-tab').forEach(t=>t.classList.toggle('active',t.dataset.map===id));
    // 更新图片
    const img=document.getElementById('mapImage');
    img.src=m.image;
    img.onerror=function(){this.src='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500"><rect fill="%230a0a1a" width="400" height="500"/><text fill="%2300d4ff" x="50%25" y="50%25" text-anchor="middle" font-family="sans-serif">地图图片加载失败</text></svg>';};
    // 重置缩放
    zoomScale=1;panX=0;panY=0;
    updateZoomTransform();
    // 加载保存的坐标
    loadSavedPositions();
    // 重新渲染标记
    renderMarkers();
    // 更新侧边栏
    initSidebar();
    // 关闭弹窗
    hidePopup();
  }

  function loadSavedPositions(){
    try{
      const saved=localStorage.getItem('sc_biz_positions_'+activeMapId);
      if(saved){const p=JSON.parse(saved);Object.assign(cityPositions,p);}
    }catch(e){}
  }

  function renderMarkers(){
    const markersLayer=document.getElementById('markersLayer');
    markersLayer.innerHTML='';
    const cc={成都:'chengdu',泸州:'luzhou',西昌:'xichang',安顺:'luzhou',黔东南:'xichang'};
    businesses.forEach(biz=>{
      const pos=cityPositions[biz.id];
      if(!pos)return;
      const m=document.createElement('div');
      m.className='biz-marker marker-'+(cc[biz.city]||'chengdu');
      m.dataset.bizId=biz.id;
      m.style.left=pos.x+'%';m.style.top=pos.y+'%';
      m.innerHTML='<div class="marker-label">'+biz.name.split('·')[0]+'</div>'+
        '<div class="pulse-marker"><div class="pulse-ring"></div><div class="pulse-ring"></div><div class="pulse-dot"></div></div>'+
        '<div class="coord-tag" id="coord_'+biz.id+'">'+Math.round(pos.x)+'% '+Math.round(pos.y)+'%</div>';
      m.addEventListener('click',e=>{if(isEditMode)return;e.stopPropagation();showPopup(biz);});
      setupMarkerDrag(m,biz.id);
      markersLayer.appendChild(m);
    });
    // 绑定地图拖拽事件（只绑定一次）
    if(!window._dragBound){
      const container=document.getElementById('mapContainer');
      container.addEventListener('mousedown',onDragStart);
      document.addEventListener('mousemove',onDragMove);
      document.addEventListener('mouseup',onDragEnd);
      container.addEventListener('touchstart',onTouchStart,{passive:false});
      container.addEventListener('touchmove',onTouchMove,{passive:false});
      container.addEventListener('touchend',onTouchEnd,{passive:false});
      container.addEventListener('wheel',onWheel,{passive:false});
      container.addEventListener('click',()=>hidePopup());
      window._dragBound=true;
    }
    updateZoomTransform();
  }

  let isEditMode=false, dragBizId=null;

  // ==================== 缩放/拖拽核心 ====================
  function updateZoomTransform(){
    const wrap=document.getElementById('mapZoomWrap');
    if(wrap)wrap.style.transform='translate('+panX+'px,'+panY+'px) scale('+zoomScale+')';
    const level=document.getElementById('zoomLevel');
    if(level)level.textContent=Math.round(zoomScale*100)+'%';
  }

  function applyZoom(newScale,cx,cy){
    const container=document.getElementById('mapContainer');
    const rect=container.getBoundingClientRect();
    const cw=rect.width,ch=rect.height;
    // 如果没有指定中心点，使用容器中心
    if(cx===undefined){cx=cw/2;cy=ch/2;}
    // 计算中心点在当前变换下的位置
    const prevCx=(cx-panX)/zoomScale;
    const prevCy=(cy-panY)/zoomScale;
    zoomScale=Math.max(zoomMin,Math.min(zoomMax,newScale));
    // 调整平移使中心点不变
    panX=cx-prevCx*zoomScale;
    panY=cy-prevCy*zoomScale;
    clampPan();
    updateZoomTransform();
  }

  function clampPan(){
    const container=document.getElementById('mapContainer');
    const cw=container.offsetWidth,ch=container.offsetHeight;
    const minX=cw*(1-zoomScale),minY=ch*(1-zoomScale);
    panX=Math.min(0,Math.max(minX,panX));
    panY=Math.min(0,Math.max(minY,panY));
  }

  // 鼠标拖拽
  function onDragStart(e){
    if(e.button!==0||isEditMode)return;
    isDragging=true;startX=e.clientX;startY=e.clientY;
    lastPanX=panX;lastPanY=panY;
  }
  function onDragMove(e){
    if(!isDragging)return;
    panX=lastPanX+(e.clientX-startX);
    panY=lastPanY+(e.clientY-startY);
    updateZoomTransform();
  }
  function onDragEnd(){isDragging=false;}

  // 触屏
  let touchIds={};
  function onTouchStart(e){
    if(e.touches.length===1&&!isEditMode){
      isDragging=true;startX=e.touches[0].clientX;startY=e.touches[0].clientY;
      lastPanX=panX;lastPanY=panY;
    }else if(e.touches.length===2){
      isDragging=false;
      const t=e.touches;lastDist=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
      lastZoomScale=zoomScale;
    }
  }
  function onTouchMove(e){
    if(e.touches.length===1&&isDragging){
      panX=lastPanX+(e.touches[0].clientX-startX);
      panY=lastPanY+(e.touches[0].clientY-startY);
      updateZoomTransform();
    }else if(e.touches.length===2){
      const t=e.touches;const dist=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
      if(lastDist>0){
        const midX=(t[0].clientX+t[1].clientX)/2,midY=(t[0].clientY+t[1].clientY)/2;
        applyZoom(lastZoomScale*(dist/lastDist),midX,midY);
      }
    }
  }
  // 双击缩放
  let lastTap=0;
  function onTouchEnd(e){
    if(e.touches.length<2)isDragging=false;
    // 双击检测
    if(e.changedTouches&&e.changedTouches.length===1){
      const now=Date.now();
      if(now-lastTap<300){
        const t=e.changedTouches[0];
        if(zoomScale<1.8){
          applyZoom(zoomScale*2,t.clientX,t.clientY);
        }else{
          zoomReset();
        }
        lastTap=0;
      }else{
        lastTap=now;
      }
    }
  }

  // 滚轮
  function onWheel(e){
    e.preventDefault();
    const delta=e.deltaY>0?-1:1;
    const factor=1+delta*0.12;
    applyZoom(zoomScale*factor,e.clientX,e.clientY);
  }

  // 缩放按钮
  function zoomIn(){applyZoom(zoomScale*1.3);}
  function zoomOut(){applyZoom(zoomScale*0.77);}
  function zoomReset(){zoomScale=1;panX=0;panY=0;updateZoomTransform();}
  // ==================== 缩放结束 ====================

  // ==================== 坐标调整 ====================
  function savePositions(){
    try{localStorage.setItem('sc_biz_positions_'+activeMapId,JSON.stringify(cityPositions));}catch(e){}
  }

  function exportCoords(){
    const json=JSON.stringify(cityPositions,null,2);
    const code="  const cityPositions = "+json+";";
    navigator.clipboard.writeText(code).then(function(){
      var hint=document.getElementById('copiedHint');
      hint.style.display='block';
      setTimeout(function(){hint.style.display='none';},3000);
    }).catch(function(){
      // 降级方案：选中文本
      var ta=document.createElement('textarea');
      ta.value=code;document.body.appendChild(ta);
      ta.select();document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('✅ 坐标已复制到剪贴板');
    });
  }

  function toggleEditMode(){
    isEditMode=!isEditMode;
    const wrapper=document.getElementById('mapWrapper');
    const btn=document.getElementById('editToggle');
    const panel=document.getElementById('coordPanel');
    wrapper.classList.toggle('edit-mode',isEditMode);
    btn.classList.toggle('active',isEditMode);
    btn.textContent=isEditMode?'✔️':'✏️';
    panel.classList.toggle('show',isEditMode);
    if(isEditMode){document.getElementById('currentMapName').textContent=mapsData[activeMapId].label;updateCoordList();}
  }

  function updateCoordList(){
    const list=document.getElementById('coordList');
    list.innerHTML=businesses.map(b=>{
      const p=cityPositions[b.id];
      return '<div class="cp-item"><span class="cp-name">'+b.cover+' '+b.name.split('·')[0]+'</span><span class="cp-coord">'+Math.round(p.x)+'%  '+Math.round(p.y)+'%</span></div>';
    }).join('');
  }

  // 标记拖拽调整
  function setupMarkerDrag(marker,bizId){
    let dragging=false,offX=0,offY=0;

    function onPointerDown(e){
      if(!isEditMode)return;
      e.stopPropagation();
      dragging=true;
      marker.classList.add('dragging');
      const rect=marker.parentElement.getBoundingClientRect();
      const cx=e.clientX||e.touches[0].clientX;
      const cy=e.clientY||e.touches[0].clientY;
      offX=cx-rect.left;offY=cy-rect.top;
    }
    function onPointerMove(e){
      if(!dragging||!isEditMode)return;
      e.preventDefault();
      const rect=marker.parentElement.getBoundingClientRect();
      const cx=e.clientX||e.touches[0].clientX;
      const cy=e.clientY||e.touches[0].clientY;
      let px=Math.max(0,Math.min(100,(cx-rect.left)/rect.width*100));
      let py=Math.max(0,Math.min(100,(cy-rect.top)/rect.height*100));
      marker.style.left=px+'%';marker.style.top=py+'%';
      cityPositions[bizId]={x:px,y:py};
      const tag=document.getElementById('coord_'+bizId);
      if(tag)tag.textContent=Math.round(px)+'% '+Math.round(py)+'%';
    }
    function onPointerUp(){
      if(dragging){
        dragging=false;marker.classList.remove('dragging');
        savePositions();
        updateCoordList();
      }
    }

    marker.addEventListener('mousedown',onPointerDown);
    document.addEventListener('mousemove',onPointerMove);
    document.addEventListener('mouseup',onPointerUp);
    marker.addEventListener('touchstart',onPointerDown,{passive:false});
    document.addEventListener('touchmove',onPointerMove,{passive:false});
    document.addEventListener('touchend',onPointerUp);
  }

  function initSidebar(){
    const list=document.getElementById('sidebarList');
    list.innerHTML=businesses.map(b=>'<div class="sb-item" onclick="enterBusiness(\''+b.id+'\');toggleSidebar()"><div class="sb-icon">'+b.cover+'</div><div class="sb-info"><div class="sb-name">'+b.name+'</div><div class="sb-meta">'+b.city+' · '+b.products.length+'件好物</div></div></div>').join('');
  }

  function initEvents(){
    document.getElementById('viewToggle').addEventListener('click',()=>{
      is3D=!is3D;
      const w=document.getElementById('mapWrapper'),b=document.getElementById('viewToggle');
      w.classList.toggle('map-3d-mode',is3D);b.classList.toggle('active',is3D);
      b.textContent=is3D?'2D':'🔄';

    document.getElementById('editToggle').addEventListener('click',toggleEditMode);
    document.getElementById('exportBtn').addEventListener('click',exportCoords);
    document.getElementById('webviewBack').addEventListener('click',closeWebview);

    document.getElementById('zoomIn').addEventListener('click',zoomIn);
    document.getElementById('zoomOut').addEventListener('click',zoomOut);
    document.getElementById('zoomReset').addEventListener('click',zoomReset);
    document.getElementById('searchInput').addEventListener('input',function(){
      const v=this.value.toLowerCase();
      document.querySelectorAll('.sb-item').forEach(item=>{
        const onclick=item.getAttribute('onclick')||'';
        const match=onclick.match(/'([^']+)'/);
        const id=match?match[1]:'';
        const b=businesses.find(x=>x.id===id);
        item.style.display=b&&(b.name.toLowerCase().includes(v)||b.city.toLowerCase().includes(v))?'flex':'none';
      });
    });
  }

  function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
  function showPopup(biz){
    hidePopup();
    document.getElementById('popCover').textContent=biz.cover;
    document.getElementById('popName').textContent=biz.name;
    document.getElementById('popCity').textContent='◆ '+biz.city;

    document.getElementById('popBtn').onclick=function(){enterBusiness(biz.id);hidePopup();};

  function hidePopup(){document.getElementById('mapPopup').classList.remove('show');}

  function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }
  function goBackFromCart(){showPage(previousPage);}

  function enterBusiness(bizId){
    const biz=businesses.find(b=>b.id===bizId);if(!biz)return;
    currentBusiness=biz;
    let html='<div class="biz-header"><div class="biz-btn-back" onclick="showPage(\'mapPage\')"><span>‹</span> 返回</div><div class="biz-cover">'+biz.cover+'</div><div class="biz-title">'+biz.name+'</div><div class="biz-desc">'+biz.description+'</div></div>';

      html+='<div class="sec-title"><h3>🤖 数字人 · 诗酒李太白</h3></div>';
      html+='<div class="digi-section" id="digiSection">';
      html+='<div class="digi-hdr"><div class="digi-avatar"><img src="李白说话.gif" alt="李白"></div><div class="digi-info"><div class="digi-name">李太白</div><div class="digi-status">在线·随时为您解答</div></div></div>';
      html+='<div class="digi-chat" id="digiChat">';
      html+='<div class="digi-msg"><div class="dm-avatar"><img src="李白说话.gif" alt="李白"></div><div class="dm-bubble">客官来啦？快请坐！关于泸州老窖的美酒文化，您尽管问！</div></div>';
      html+='</div>';
      html+='<div class="digi-input"><input type="text" id="digiInput" placeholder="输入你的问题..." onkeypress="if(event.key===\'Enter\')sendDigiMsg()"><button class="digi-send" onclick="sendDigiMsg()">➤</button></div>';
      html+='</div>';
    }
    html+='<div class="sec-title"><h3>🏪 空间功能</h3></div><div class="f-grid">';
    biz.features.forEach((f,i)=>{html+='<div class="f-card" onclick="handleFeature(\''+f.id+'\',\''+biz.id+'\')" style="animation:fadeInUp .4s ease '+(i*0.1)+'s forwards;opacity:0"><div class="fi">'+f.icon+'</div><div class="fn">'+f.name+'</div><div class="fd">'+f.desc+'</div></div>';});
    html+='</div>';
    html+='<div class="sec-title"><h3>🛒 推荐商品</h3><span class="ml" onclick="showProductList(\''+biz.id+'\')">查看全部 ›</span></div><div class="f-prods">';
    biz.products.slice(0,4).forEach(p=>{html+='<div class="f-p-card" onclick="showProductDetail(\''+p.id+'\',\''+biz.id+'\')"><div class="pi" style="background:'+getGradient(p)+'">'+p.image+'</div><div class="pib"><div class="pn">'+p.name+'</div><div class="pp">'+p.price+'</div></div></div>';});
    html+='</div>';
    document.getElementById('businessContent').innerHTML=html;
    showPage('businessPage');
  }

  // 数字人问答（演示模式）
  function sendDigiMsg(){
    const input=document.getElementById('digiInput');
    const chat=document.getElementById('digiChat');
    if(!input||!chat||!input.value.trim())return;
    const q=input.value.trim();
    input.value='';
    // 用户消息
    chat.innerHTML+='<div class="digi-msg dm-user"><div class="dm-bubble">'+q+'</div></div>';
    chat.scrollTop=chat.scrollHeight;
    // 李白回复（演示）
    const replies={
      '泸州老窖':'泸州老窖始于明朝万历年间（公元1573年），被誉为"浓香鼻祖"，是国家级非物质文化遗产。其国宝窖池群连续使用至今已超过440年！',
      '价格':'好酒不问价，醺然自得意。国窖1573系列从千元起，窖龄酒、珍藏版各有千秋，丰俭由君。',
      '怎么买':'在咱们元宇宙商城里就可以选购！点击下方「精选酒品」进入商品列表，线上下单，美酒送到家。',
      '酒窖':'泸州老窖拥有世界上最大的白酒窖池群——1573国宝窖池群，被列为全国重点文物保护单位，您可以点击「酒窖漫游」VR参观！',
      '白酒':'白酒分为酱香、浓香、清香、米香等香型。泸州老窖是浓香型白酒的典型代表，以其"窖香浓郁、绵甜甘冽"著称。',
      '你好':'小生这厢有礼了！欢迎来到泸州老窖·数字酒庄，想了解什么尽管开口～',
      '谢谢':'不客气！愿君多饮几杯，诗酒趁年华。🍶',
      'default':'好问题！小生以为，泸州老窖之美，在于其"天地同酿、人间共生"的匠心。待我为您细细道来...您可以试试问问价格、酒窖或怎么购买。'
    };
    let reply=replies['default'];
    for(const[key,val]of Object.entries(replies)){
      if(q.includes(key)){reply=val;break;}
    }
    setTimeout(function(){
      chat.innerHTML+='<div class="digi-msg"><div class="dm-avatar"><img src="李白说话.gif" alt="李白"></div><div class="dm-bubble">'+reply+'</div></div>';
      chat.scrollTop=chat.scrollHeight;
    },600);
  }

  let previousWebviewPage='businessPage';
  function openWebview(url,title){
    // 记录当前页面
    const cur=document.querySelector('.page.active');
    previousWebviewPage=cur?cur.id:'businessPage';
    document.getElementById('webviewTitle').textContent=title||'全景浏览';
    document.getElementById('webviewIframe').src=url;
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('webviewPage').classList.add('active');
  }
  function closeWebview(){
    document.getElementById('webviewPage').classList.remove('active');
    document.getElementById('webviewIframe').src='';
    showPage(previousWebviewPage);
  }

  function handleFeature(fid,bizId){
    if(fid==='products'){showProductList(bizId);return;}
    const biz=businesses.find(b=>b.id===bizId);if(!biz)return;
    const f=biz.features.find(x=>x.id===fid);if(!f)return;
    // 泸州老窖云参观 → 720yun全景
    if(bizId==='lz1'&&fid==='tour'){
      openWebview('https://www.720yun.com/t/0d22amfvuus?scene_id=498283','泸州老窖·云参观空间');
      return;
    }
    const msgs={tour:'🎬 正在进入「'+f.name+'」...\n（演示模式：VR全景漫游）',story:'📖 「'+f.name+'」\n（演示模式：品牌故事展览）',ar:'🥽 正在启动AR模块...\n（演示模式：虚拟试穿/体验）'};
    showToast(msgs[fid]||'🚧 「'+f.name+'」开发中...');
  }

  function getGradient(p){
    const colors={'🏙️':'linear-gradient(135deg,#667eea,#764ba2)','🌐':'linear-gradient(135deg,#f093fb,#f5576c)','🍶':'linear-gradient(135deg,#4facfe,#00f2fe)','🌊':'linear-gradient(135deg,#43e97b,#38f9d7)','🔥':'linear-gradient(135deg,#fa709a,#fee140)','🧣':'linear-gradient(135deg,#a8edea,#fed6e3)','☕':'linear-gradient(135deg,#d299c2,#fef9d7)','👕':'linear-gradient(135deg,#89f7fe,#66a6ff)','🖼️':'linear-gradient(135deg,#fddb92,#d1fdff)','🥽':'linear-gradient(135deg,#e0c3fc,#8ec5fc)','🎫':'linear-gradient(135deg,#ffecd2,#fcb69f)','🍾':'linear-gradient(135deg,#ff9a9e,#fecfef)','🍷':'linear-gradient(135deg,#a18cd1,#fbc2eb)','🏺':'linear-gradient(135deg,#fad0c4,#ffd1ff)','🍵':'linear-gradient(135deg,#84fab0,#8fd3f4)','💍':'linear-gradient(135deg,#a6c0fe,#f68084)','🎟️':'linear-gradient(135deg,#fccb90,#d57eeb)','🥢':'linear-gradient(135deg,#e0c3fc,#8ec5fc)','🌙':'linear-gradient(135deg,#43e97b,#38f9d7)'};
    return colors[p.image]||'linear-gradient(135deg,'+getComputedStyle(document.documentElement).getPropertyValue('--pri').trim()+','+getComputedStyle(document.documentElement).getPropertyValue('--sec').trim()+')';
  }

  function showProductList(bizId){
    const biz=businesses.find(b=>b.id===bizId);if(!biz)return;
    currentBusiness=biz;
    let html='<div class="pl-hdr"><span class="bb" onclick="showPage(\'businessPage\')">‹</span><h2>'+biz.name+'</h2><span class="ci" onclick="showCartPage()">🛒<span class="cart-badge" id="cartBadge2"></span></span></div><div class="p-grid">';
    biz.products.forEach(p=>{html+='<div class="p-card" onclick="showProductDetail(\''+p.id+'\',\''+biz.id+'\')"><div class="pi-big" style="background:'+getGradient(p)+'">'+p.image+'</div><div class="pbody"><div class="pn2">'+p.name+'</div><div class="pp2">¥'+p.price+'</div></div></div>';});
    html+='</div>';
    document.getElementById('productListContent').innerHTML=html;
    const b2=document.getElementById('cartBadge2');if(b2){const c=cart.reduce((s,i)=>s+i.quantity,0);b2.textContent=c;b2.style.display=c>0?'flex':'none';}
    showPage('productListPage');
  }

  function showProductDetail(pid,bizId){
    const biz=businesses.find(b=>b.id===bizId);if(!biz)return;
    const p=biz.products.find(x=>x.id===pid);if(!p)return;
    currentProduct=p;currentBusiness=biz;selectedSpec=p.specs[0];
    let html='<div class="pd-detail"><div class="pd-hdr" style="background:'+getGradient(p)+'"><span style="font-size:70px">'+p.image+'</span><div class="pd-back" onclick="showProductList(\''+biz.id+'\')">‹</div><div class="pd-cart-btn" onclick="showCartPage()">🛒</div></div><div class="pd-info"><div class="pd-name">'+p.name+'</div><div class="pd-price">¥'+p.price+'</div><div class="pd-st">选择规格</div><div class="pd-specs" id="specOptions">';
    p.specs.forEach((s,i)=>{html+='<button class="pd-spec'+(i===0?' selected':'')+'" onclick="selectSpec(this,\''+s+'\')">'+s+'</button>';});
    html+='</div><div class="pd-desc">'+p.desc+'</div></div></div><div class="buy-bar"><button class="bb2" onclick="addToCartFromDetail()">🛒 加入购物车</button><button class="bbb" onclick="buyNow()">立即购买</button></div>';
    document.getElementById('productDetailContent').innerHTML=html;
    showPage('productDetailPage');
  }

  function selectSpec(btn,spec){document.querySelectorAll('.pd-spec').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedSpec=spec;}
  function addToCartFromDetail(){
    if(!currentProduct||!currentBusiness)return;
    const e=cart.find(i=>i.product.id===currentProduct.id&&i.spec===selectedSpec);
    e?e.quantity++:cart.push({product:currentProduct,spec:selectedSpec,quantity:1,businessName:currentBusiness.name});
    updateCartBadge();
    showToast('✅ 已加入购物车\n'+currentProduct.name+'（'+selectedSpec+'）');
  }
  function buyNow(){addToCartFromDetail();showToast('🎉 感谢您的购买！\n订单已提交，商家将尽快发货');}

  function showCartPage(){
    previousPage=document.querySelector('.page.active').id;
    const c=document.getElementById('cartContent');
    if(cart.length===0){
      c.innerHTML='<div class="cart-hdr"><span class="bb" onclick="goBackFromCart()">‹</span><h2>购物车</h2></div><div class="cart-empty"><div class="ei">🛒</div><div class="et">购物车还是空的</div></div>';
    }else{
      let html='<div class="cart-hdr"><span class="bb" onclick="goBackFromCart()">‹</span><h2>购物车</h2><span style="font-size:12px;color:var(--txt3)">共'+cart.reduce((s,i)=>s+i.quantity,0)+'件</span></div><div class="cart-list">';
      cart.forEach(item=>{html+='<div class="cart-item"><div class="ci-img" style="background:'+getGradient(item.product)+'">'+item.product.image+'</div><div class="ci-info"><div class="ci-name">'+item.product.name+'</div><div class="ci-spec">'+item.spec+' × '+item.quantity+'</div><div class="ci-bot"><span class="ci-price">¥'+(item.product.price*item.quantity)+'</span><span style="font-size:11px;color:var(--txt3)">'+item.businessName+'</span></div></div></div>';});
      html+='</div>';
      c.innerHTML=html;
    }
    showPage('cartPage');
  }
  function updateCartBadge(){
    const b=document.getElementById('cartBadge');
    if(b){const c=cart.reduce((s,i)=>s+i.quantity,0);b.textContent=c;b.style.display=c>0?'flex':'none';}
  }
  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
  }
</script>
