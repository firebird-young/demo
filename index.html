<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>深圳文化产权交易所 - 数字资产平台</title>
<style>
body{margin:0;background:#2c2c2e;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;color:#333;display:flex;justify-content:center}
.page{max-width:430px;min-height:100vh;background:#f6f7fb;padding:16px;padding-bottom:80px;position:relative}
@media(max-width:430px){.page{max-width:100%}}

/* ── 顶部 ── */
.header{display:flex;justify-content:space-between;align-items:center}
.logo{height:32px;width:auto}
.header-icons{display:flex;gap:16px}
.header-icons .hi{width:22px;height:22px;color:#555;cursor:pointer;transition:transform .15s}
.header-icons .hi:active{transform:scale(.8)}
.header-icons .hi svg{display:block;width:100%;height:100%}

/* ── 用户卡 ── */
.user-card{margin-top:16px;background:linear-gradient(135deg,#D70C1F,#F12B3D);border-radius:24px;padding:20px;color:#fff;display:flex;justify-content:space-between;align-items:center;animation:fadeUp .4s ease-out}
.user-left{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
.avatar{width:60px;height:60px;border-radius:50%;border:2px solid rgba(255,255,255,.25);object-fit:cover;display:block;flex-shrink:0}
.user-left h2{font-size:17px;font-weight:700;margin:0 0 2px}
.user-left p{font-size:11px;margin:0;opacity:.55}
.verify-btn{height:40px;padding:0 18px;border:none;border-radius:20px;background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;letter-spacing:.5px;transition:background .2s}
.verify-btn:active{background:rgba(255,255,255,.35)}

/* ── 元宇宙模式 ── */
.meta-banner{margin-top:16px;border-radius:20px;overflow:hidden;cursor:pointer;transition:transform .2s;animation:fadeUp .4s ease-out .06s both;position:relative}
.meta-banner:active{transform:scale(.98)}
.mb-bg{width:100%;height:150px;background-position:center;background-size:cover;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:0 24px;position:relative;gap:12px}
.mb-bg::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.2);pointer-events:none}
.mb-text{position:relative;z-index:1}
.mb-text h3{font-size:18px;font-weight:700;color:#fff;margin:0 0 4px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.mb-text p{font-size:12px;margin:0;color:rgba(255,255,255,.75);text-shadow:0 1px 4px rgba(0,0,0,.2)}
.mb-btn{position:relative;z-index:1;background:linear-gradient(135deg,#D70C1F,#F12B3D);border:none;color:#fff;font-size:12px;font-weight:700;padding:8px 20px;border-radius:20px;cursor:pointer;box-shadow:0 4px 14px rgba(215,12,31,.4);transition:transform .2s,box-shadow .2s;letter-spacing:.5px}
.mb-btn:active{transform:scale(.92);box-shadow:0 2px 8px rgba(215,12,31,.3)}

/* ── 金刚区 ── */
.menu-grid{margin-top:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;background:#fff;padding:20px;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,.04);animation:fadeUp .4s ease-out .1s both}
.menu-item{text-align:center;cursor:pointer;border:none;background:none;padding:0;transition:transform .15s}
.menu-item:active{transform:scale(.88)}
.menu-icon{width:52px;height:52px;margin:0 auto 8px;border-radius:16px;background:#FFF2F3;display:flex;justify-content:center;align-items:center;transition:box-shadow .2s}
.menu-icon svg{width:26px;height:26px;display:block}
.menu-item:active .menu-icon{box-shadow:0 0 0 3px rgba(215,12,31,.12)}
.menu-item span{font-size:11px;color:#555;font-weight:500;display:block;line-height:1.2}

/* ── 故事Banner ── */
.story-banner{border-radius:20px;overflow:hidden;cursor:pointer;transition:transform .2s}
.story-banner:active{transform:scale(.98)}
.sb-img{width:100%;height:160px;background-position:center;background-size:cover;position:relative;display:flex;align-items:flex-end;padding:16px}
.sb-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent,rgba(0,0,0,.55));pointer-events:none}
.sb-overlay{position:relative;z-index:1}
.sb-title{color:#fff;font-size:18px;font-weight:700;letter-spacing:.5px;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.sb-sub{color:rgba(255,255,255,.65);font-size:11px;margin-top:2px;text-shadow:0 1px 3px rgba(0,0,0,.2)}

/* ── 故事指示点 ── */
.story-dots{display:flex;justify-content:center;gap:4px;padding:10px 0 2px}
.sd{width:5px;height:5px;border-radius:50%;background:#ddd;transition:all .3s;cursor:pointer}
.sd.on{width:18px;border-radius:3px;background:linear-gradient(90deg,#D70C1F,#F12B3D)}

/* ── 区块标题 ── */
.section{margin-top:24px;animation:fadeUp .4s ease-out .16s both}
.section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-title span{font-size:17px;font-weight:700;color:#1a1a2e;display:flex;align-items:center;gap:8px}
.section-title span::before{content:'';display:inline-block;width:3px;height:16px;background:#D70C1F;border-radius:2px}
.section-title a{font-size:12px;color:#999;cursor:pointer;padding:4px 0;transition:color .2s}
.section-title a:active{color:#D70C1F}

/* ── 入驻商家（横向滚动） ── */
.merchant-list{display:flex;gap:10px;overflow-x:auto;padding:0 0 4px;scrollbar-width:none}
.merchant-list::-webkit-scrollbar{display:none}
.merchant-card{flex-shrink:0;width:110px;background:#fff;border-radius:16px;overflow:hidden;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.04);transition:transform .2s;border:1px solid #f0f0f0}
.merchant-card:active{transform:scale(.94)}
.merchant-card img{width:100%;height:72px;object-fit:cover;display:block}
.merchant-card p{font-size:12px;font-weight:600;text-align:center;padding:8px 8px 10px;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-cover2{height:72px;background-position:center;background-size:cover;position:relative}
.mc-type{position:absolute;bottom:0;left:0;right:0;padding:3px 8px;font-size:9px;color:#fff;text-align:center;font-weight:500;backdrop-filter:blur(2px)}
.t-food{background:rgba(215,12,31,.7)}
.t-ent{background:rgba(108,92,231,.7)}
.t-tour{background:rgba(0,184,148,.7)}

/* ── 数字资产市场（2列网格） ── */
.goods-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.goods-card{background:#fff;border-radius:20px;overflow:hidden;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.04);transition:transform .2s,box-shadow .2s}
.goods-card:active{transform:scale(.96);box-shadow:0 4px 14px rgba(0,0,0,.08)}
.goods-card img{width:100%;height:130px;object-fit:cover;display:block}
.goods-card h4{font-size:13px;font-weight:600;padding:10px 12px 0;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.goods-card .tags{padding:0 12px;margin-top:4px}
.goods-card .tags span{display:inline-block;font-size:9px;color:#D70C1F;background:#FFF2F3;padding:2px 8px;border-radius:4px;font-weight:500}
.goods-card .price{color:#D70C1F;font-size:22px;font-weight:700;padding:4px 12px 0}
.goods-card .price small{font-size:11px;font-weight:400;color:#999}
.goods-card .sold{color:#999;font-size:10px;padding:0 12px 12px}

/* ── 底部TabBar ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:64px;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(0,0,0,.05);display:flex;align-items:center;justify-content:space-between;padding:0 16px;padding-bottom:env(safe-area-inset-bottom,4px);z-index:100}
.bnav .ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:none;padding:4px 10px;font-size:10px;color:#999;transition:color .2s}
.bnav .ni .ico{width:22px;height:22px;transition:transform .15s}
.bnav .ni .ico svg{display:block;width:100%;height:100%}
.bnav .ni:active .ico{transform:scale(.8)}
.bnav .ni.on{color:#D70C1F}
.bnav .ni.on .ico{transform:scale(1.05)}
.bnav .ni span:last-child{font-size:10px;display:block}

/* ── 动画 ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
