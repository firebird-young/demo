<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>元·商场 — 元宇宙商家地图</title>
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root { --primary:#6c63ff; --accent:#00d4ff; --bg-dark:#0a0a1a; --bg-card:rgba(255,255,255,.05);
      --bg-hov:rgba(255,255,255,.08); --txt:#fff; --txt2:rgba(255,255,255,.7); --txt3:rgba(255,255,255,.4);
      --bd:rgba(255,255,255,.1); --r:16px; --rs:12px; --rx:8px; }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
      background:#fff; color:var(--txt); overflow:hidden; height:100%; width:100%;
      display:flex; align-items:center; justify-content:center; }

    /* 手机外壳 */
    .phone-frame{
      width:100vw;height:100vh;
      max-width:420px;max-height:932px;
      position:relative;overflow:hidden;
      background:var(--bg-dark);
      box-shadow:0 0 0 1px rgba(0,212,255,.08),0 20px 80px rgba(0,0,0,.06),0 0 40px rgba(108,99,255,.04);
    }
    @media(min-width:500px){.phone-frame{border-radius:40px;max-height:850px}body{padding:20px}}

    /* 状态栏 */
    .status-bar{
      height:44px;flex-shrink:0;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;
      background:rgba(10,10,26,.85);backdrop-filter:blur(10px);
      z-index:1000;font-size:11px;color:var(--txt3);
      position:relative;
    }
    .status-bar .time{font-weight:600}
    .status-icons{display:flex;gap:6px;font-size:12px}

    /* 页面系统 */
    .page { position:absolute; top:44px; left:0; width:100%; height:calc(100% - 44px);
      overflow-y:auto; overflow-x:hidden; z-index:1; background:var(--bg-dark); display:none; }
    .page.active { display:block; }

    /* ===== 地图页 ===== */
    #mapPage { z-index:5; background:transparent; flex-direction:column; padding:0; }
    #mapPage.active { display:flex; }
    .map-header { padding:8px 16px 6px; flex-shrink:0;
      background:rgba(10,10,26,.9); backdrop-filter:blur(10px);
      display:flex; flex-direction:column; gap:6px;
      border-bottom:1px solid rgba(0,212,255,.08); z-index:800; }
    .map-header .page-title { font-size:17px; font-weight:700;
      background:linear-gradient(135deg,#6c63ff,#00d4ff);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .map-header .page-subtitle { font-size:10px; color:var(--txt2); margin-top:1px; }
    .map-header-actions{display:flex;gap:6px}
    .btn-icon{
      width:34px;height:34px;border-radius:8px;
      border:1px solid rgba(0,212,255,.2);
      background:rgba(10,10,26,.7);backdrop-filter:blur(8px);
      color:var(--accent);display:flex;align-items:center;justify-content:center;
      cursor:pointer;font-size:13px;font-family:monospace;
    }
    .btn-icon:active{background:rgba(108,99,255,.2)}
    .btn-icon.active{background:rgba(108,99,255,.2);border-color:var(--primary)}

    /* 地图切换滑块 */
    .map-swiper{
      display:flex;align-items:center;gap:6px;
      overflow-x:auto;scrollbar-width:none;
    }
    .map-swiper::-webkit-scrollbar{display:none}
    .map-swiper>*{pointer-events:auto}
    .map-tab{
      flex-shrink:0;padding:4px 12px;border-radius:14px;
      border:1px solid rgba(0,212,255,.2);
      background:rgba(10,10,26,.75);backdrop-filter:blur(8px);
      color:var(--txt2);font-size:12px;cursor:pointer;
      transition:all .2s;display:flex;align-items:center;gap:4px;
      white-space:nowrap
    }
    .map-tab.active{background:rgba(108,99,255,.3);border-color:var(--primary);color:var(--txt)}

    /* 3D 地图容器 */
    .map-3d-stage { flex:1; overflow:hidden; position:relative; background:#0a0a1a; }
    #mapLeaflet { width:100%; height:100% !important; position:relative; z-index:1; }

    /* Pulse marker + 商户名称标签 */
    .pulse-icon { background:transparent; border:none; }
    .pulse-marker { position:relative; width:44px; height:44px; }
    .pulse-dot { position:absolute; width:22px; height:22px; border-radius:50%;
      top:50%; left:50%; transform:translate(-50%,-50%);
      box-shadow:0 2px 10px rgba(0,0,0,.5); z-index:2;
      border:3px solid rgba(255,255,255,.8); animation:pulse-dot 2s ease-in-out infinite; }
    .pulse-ring { position:absolute; width:44px; height:44px; border-radius:50%;
      top:50%; left:50%; transform:translate(-50%,-50%);
      animation:pulse-ring 2s ease-in-out infinite; opacity:0; }
    @keyframes pulse-dot { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.15)} }
    @keyframes pulse-ring { 0%{transform:translate(-50%,-50%) scale(.6);opacity:.8} 100%{transform:translate(-50%,-50%) scale(2.2);opacity:0} }
    /* 商户名称标签 */
    .marker-label{position:absolute;top:-30px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10px;color:#00d4ff;text-shadow:0 0 8px #00d4ff;font-weight:500;background:rgba(10,10,26,.85);padding:2px 8px;border-radius:8px;border:1px solid rgba(0,212,255,.3);pointer-events:none;z-index:3}

    /* Leaflet 弹窗 */
    .leaflet-popup-content-wrapper { border-radius:14px!important;
      background:rgba(15,15,35,.96)!important; color:#fff!important;
      border:1px solid rgba(0,212,255,.15)!important;
      box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 20px rgba(108,99,255,.1)!important; }
    .leaflet-popup-tip { background:rgba(15,15,35,.96)!important;
      border:1px solid rgba(0,212,255,.15)!important; border-top:none!important; border-left:none!important; }
    .leaflet-popup-content { margin:14px 16px!important; min-width:200px; }
    .pop-cover { font-size:30px; margin-bottom:4px; }
    .pop-name { font-size:15px; font-weight:700; color:#fff; margin-bottom:2px; }
    .pop-city { font-size:11px; color:rgba(0,212,255,.6); margin-bottom:6px; }
    .pop-desc { font-size:11px; color:rgba(255,255,255,.6); line-height:1.4; margin-bottom:8px; display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
    .pop-tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
    .pop-tag { padding:2px 8px; border-radius:12px; font-size:9px; background:rgba(108,99,255,.12); color:#b0a8ff; border:1px solid rgba(108,99,255,.15); }
    .pop-btn { display:block; width:100%; padding:8px 0; border-radius:8px;
      background:linear-gradient(135deg,#6c63ff,#00d4ff); color:#fff;
      font-size:12px; font-weight:600; border:none; cursor:pointer; text-align:center; }



    /* 侧边栏 - 底部滑出 (移动端) */
    .sidebar{
      position:absolute;bottom:0;left:0;right:0;max-height:50vh;
      background:rgba(10,10,26,.96);backdrop-filter:blur(20px);
      border-radius:20px 20px 0 0;
      border-top:1px solid rgba(0,212,255,.15);
      box-shadow:0 -4px 30px rgba(108,99,255,.1);
      z-index:900;
      transform:translateY(100%);transition:transform .35s cubic-bezier(0.4,0,0.2,1);
      display:flex;flex-direction:column;
    }
    .sidebar.open{transform:translateY(0)}
    .sb-handle{width:36px;height:4px;border-radius:2px;background:rgba(0,212,255,.3);margin:8px auto;flex-shrink:0}
    .sb-hdr{padding:0 16px 10px;border-bottom:1px solid rgba(0,212,255,.08);flex-shrink:0}
    .sb-title{font-size:15px;font-weight:600;margin-bottom:8px}
    .s-search input{width:100%;padding:8px 12px;border:1px solid rgba(0,212,255,.2);border-radius:8px;font-size:12px;background:rgba(255,255,255,.05);color:#fff;outline:none;}
    .s-search input::placeholder{color:rgba(255,255,255,.3)}
    .sb-list{flex:1;overflow-y:auto;padding:4px 0;padding-bottom:calc(20px + env(safe-area-inset-bottom,10px))}
    .sb-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-bottom:1px solid rgba(0,212,255,.04)}
    .sb-item:active{background:rgba(108,99,255,.1)}
    .sb-item .sn{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
    .sb-item .sn .cover{font-size:18px}
    .sb-item .scity{font-size:10px;color:rgba(0,212,255,.5)}
    .sb-item .sbadge{padding:2px 8px;border-radius:10px;font-size:9px;background:rgba(0,212,255,.1);color:var(--accent);margin-left:auto;flex-shrink:0}
    .sb-item .sdesc{display:none}
    .s-stats{display:none}

    /* ===== 商家空间 ===== */
    .biz-header { position:relative; padding:16px; overflow:hidden; }
    .biz-header::before { content:''; position:absolute; top:0; left:0; right:0; bottom:0;
      background:linear-gradient(135deg,rgba(108,99,255,.15),rgba(0,212,255,.08)); z-index:0; }
    .biz-header .hc { position:relative; z-index:1; }
    .biz-btn-back { display:inline-flex; align-items:center; gap:4px; color:var(--txt2); font-size:13px; cursor:pointer; padding:4px 0; margin-bottom:10px; }
    .biz-cover { font-size:40px; margin-bottom:8px; }
    .biz-title { font-size:20px; font-weight:700; margin-bottom:4px; }
    .biz-desc { font-size:12px; color:var(--txt2); line-height:1.5; }
    .f-grid { padding:12px 16px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .f-card { background:rgba(255,255,255,.04); border:1px solid var(--bd); border-radius:14px; padding:14px; cursor:pointer; transition:all .2s; text-align:center; }
    .f-card:active { transform:scale(.96); background:rgba(255,255,255,.08); }
    .f-card .fi { font-size:26px; margin-bottom:8px; }
    .f-card .fn { font-size:13px; font-weight:600; margin-bottom:2px; }
    .f-card .fd { font-size:10px; color:var(--txt3); line-height:1.3; }
    .sec-title { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 8px; }
    .sec-title h3 { font-size:15px; font-weight:600; }
    .sec-title .ml { font-size:12px; color:var(--accent); cursor:pointer; }
    .f-prods { padding:0 16px 16px; display:flex; gap:10px; overflow-x:auto; scrollbar-width:none; }
    .f-prods::-webkit-scrollbar { display:none; }
    .f-p-card { min-width:120px; background:rgba(255,255,255,.04); border:1px solid var(--bd); border-radius:12px; overflow:hidden; cursor:pointer; flex-shrink:0; }
    .f-p-card:active { transform:scale(.96); }
    .f-p-card .pi { height:80px; display:flex; align-items:center; justify-content:center; font-size:34px; }
    .f-p-card .pib { padding:8px 10px; }
    .f-p-card .pn { font-size:11px; font-weight:500; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .f-p-card .pp { font-size:13px; font-weight:700; color:var(--accent); }

    /* ===== 商品 ===== */
    .pl-hdr { padding:12px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--bd); position:sticky; top:0; background:var(--bg-dark); z-index:10; }
    .pl-hdr .bb { font-size:17px; cursor:pointer; width:32px; height:32px; border-radius:8px; display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04); }
    .pl-hdr h2 { font-size:16px; font-weight:600; flex:1; overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
    .pl-hdr .ci { position:relative; font-size:18px; cursor:pointer; width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04); }
    .cart-badge { position:absolute; top:-2px; right:-4px; min-width:16px; height:16px; background:#ff4757; color:#fff; font-size:9px; font-weight:700; border-radius:8px; display:none; align-items:center; justify-content:center; padding:0 4px; border:2px solid var(--bg-dark); }
    .p-grid { padding:12px 16px; display:grid; grid-template-columns:1fr 1fr; gap:10px; padding-bottom:80px; }
    .p-card { background:rgba(255,255,255,.04); border:1px solid var(--bd); border-radius:var(--rs); overflow:hidden; cursor:pointer; }
    .p-card:active { transform:scale(.97); }
    .p-card .pi-big { height:120px; display:flex; align-items:center; justify-content:center; font-size:48px; }
    .p-card .pbody { padding:10px; }
    .p-card .pn2 { font-size:12px; font-weight:500; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:32px; }
    .p-card .pp2 { font-size:14px; font-weight:700; color:var(--accent); }

    /* ===== 商品详情 ===== */
    .pd-detail { padding-bottom:80px; }
    .pd-hdr { position:relative; height:200px; display:flex; align-items:center; justify-content:center; font-size:70px; }
    .pd-back { position:absolute; top:12px; left:12px; width:34px; height:34px; border-radius:50%; background:rgba(10,10,26,.6); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer; z-index:5; border:1px solid rgba(255,255,255,.1); }
    .pd-cart-btn { position:absolute; top:12px; right:12px; width:34px; height:34px; border-radius:50%; background:rgba(10,10,26,.6); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer; z-index:5; border:1px solid rgba(255,255,255,.1); }
    .pd-info { padding:16px; margin-top:-16px; background:var(--bg-dark); border-radius:16px 16px 0 0; position:relative; }
    .pd-name { font-size:18px; font-weight:700; margin-bottom:6px; }
    .pd-price { font-size:22px; font-weight:800; color:var(--accent); margin-bottom:12px; }
    .pd-st { font-size:13px; font-weight:600; margin-bottom:8px; }
    .pd-specs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .pd-spec { padding:6px 14px; border-radius:16px; border:1px solid var(--bd); font-size:12px; cursor:pointer; transition:all .2s; background:transparent; color:var(--txt); }
    .pd-spec.selected { background:rgba(108,99,255,.3); border-color:var(--primary); }
    .pd-desc2 { font-size:13px; color:var(--txt2); line-height:1.6; }
    .buy-bar { position:fixed; bottom:0; left:50%; width:100%; max-width:420px;transform:translateX(-50%);
      padding:10px 16px; padding-bottom:calc(10px+env(safe-area-inset-bottom,10px));
      background:rgba(10,10,26,.95); backdrop-filter:blur(20px);
      border-top:1px solid var(--bd); display:flex; gap:10px; z-index:100; }
    .buy-bar .bb2 { flex:1; padding:10px; border-radius:10px; border:1px solid var(--bd); background:rgba(255,255,255,.04); color:var(--txt); font-size:13px; font-weight:500; cursor:pointer; }
    .buy-bar .bbb { flex:2; padding:10px; border-radius:10px; border:none; background:linear-gradient(135deg,#6c63ff,#00d4ff); color:#fff; font-size:13px; font-weight:600; cursor:pointer; }

    /* ===== 购物车 ===== */
    .cart-hdr { padding:12px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--bd); }
    .cart-hdr .bb { font-size:17px; cursor:pointer; }
    .cart-hdr h2 { font-size:16px; font-weight:600; flex:1; }
    .cart-list { padding:12px 16px; }
    .cart-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,.06); }
    .cart-item .ci-img { width:50px; height:50px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0; }
    .cart-item .ci-info { flex:1; min-width:0; }
    .cart-item .ci-name { font-size:13px; font-weight:500; margin-bottom:2px; }
    .cart-item .ci-spec { font-size:11px; color:var(--txt3); margin-bottom:4px; }
    .cart-item .ci-bot { display:flex; align-items:center; justify-content:space-between; }
    .cart-item .ci-price { font-size:14px; font-weight:700; color:var(--accent); }
    .cart-empty { text-align:center; padding:40px 20px; }
    .cart-empty .ei { font-size:50px; margin-bottom:12px; opacity:.5; }
    .cart-empty .et { font-size:14px; color:var(--txt3); }

    /* Toast */
    .toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(.8); background:rgba(10,10,26,.95); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.15); border-radius:14px; padding:16px 24px; text-align:center; z-index:9999; opacity:0; pointer-events:none; transition:all .3s; box-shadow:0 10px 40px rgba(0,0,0,.5); max-width:300px; }
    .toast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
    .toast .ti { font-size:30px; margin-bottom:6px; }
    .toast .tt { font-size:13px; font-weight:500; }

    /* Webview 内嵌页面 */
    .webview-page{position:absolute;top:44px;left:0;width:100%;height:calc(100% - 44px);z-index:999;background:var(--bg-dark);display:none;flex-direction:column}
    .webview-page.active{display:flex}
    .webview-hdr{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(10,10,26,.95);border-bottom:1px solid var(--bd);flex-shrink:0}
    .webview-hdr .wb{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--bg-card);cursor:pointer}
    .webview-hdr .wt{flex:1;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt2)}
    .webview-iframe{flex:1;border:none;width:100%}

    .map-hint { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); z-index:10;
      font-size:9px; color:rgba(0,212,255,.3); background:rgba(10,10,26,.5);
      padding:3px 10px; border-radius:10px; white-space:nowrap; pointer-events:none;
      font-family:monospace; letter-spacing:1px; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div class="phone-frame">
  <!-- 状态栏 -->
  <div class="status-bar">
    <span class="time" id="statusTime">9:41</span>
    <span class="status-icons">📶 🔋</span>
  </div>

  <!-- Page 1: Map -->
  <div id="mapPage" class="page active">
    <div class="map-header">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="page-title">🌌 元·商场</div>
        <div class="map-header-actions">
          <div class="btn-icon" id="menuToggle">☰</div>
        </div>
      </div>
      <div class="map-swiper" id="mapSwiper"></div>
    </div>
    <div class="map-3d-stage">
      <div id="mapLeaflet"></div>
      <div class="map-hint">✦ 点击省份查看商家 ✦</div>
      <div class="sidebar" id="sidebar">
        <div class="sb-handle"></div>
        <div class="sb-hdr">
          <div class="sb-title">商家列表</div>
          <div class="s-search"><input type="text" id="searchInput" placeholder="搜索商家名称、城市..."></div>
        </div>
        <div class="sb-list" id="merchantList"></div>
      </div>
    </div>
  </div>

  <!-- Pages 2-5 -->
  <div id="businessPage" class="page hidden"><div id="businessContent"></div></div>
  <div id="productListPage" class="page hidden"><div id="productListContent"></div></div>
  <div id="productDetailPage" class="page hidden"><div id="productDetailContent"></div></div>
  <div id="cartPage" class="page hidden"><div id="cartContent"></div></div>

  <!-- ==================== 内嵌网页(VR全景等) ==================== -->
  <div class="webview-page" id="webviewPage">
    <div class="webview-hdr">
      <span class="wb" id="webviewBack">‹</span>
      <span class="wt" id="webviewTitle">云参观空间</span>
    </div>
    <iframe class="webview-iframe" id="webviewIframe" allow="fullscreen; gyroscope; accelerometer; magnetometer" allowfullscreen></iframe>
  </div>

  <div class="toast" id="toast"><div class="ti">💡</div><div class="tt">提示信息</div></div>
  <span class="cart-badge" id="cartBadge" style="position:fixed;top:54px;right:calc(50% - 200px);z-index:9998;display:none;">0</span>
</div>

<script>
  // ==================== 多地图数据 ====================
  const mapsData = {
    sichuan: {
      label: '四川', icon: '🌶️',
      center: [29.5, 103.5], zoom: 7,
      businesses: [
        { id:'cd1', name:'春熙里·数字商业街', city:'成都', lat:30.6578, lng:104.0818, cover:'🏙️',
          description:'坐落于成都春熙路核心商圈，融合数字孪生与AR技术的沉浸式购物空间。',
          features:[{id:'tour',icon:'🏛️',name:'云参观空间',desc:'360°全景漫游商业街'},{id:'products',icon:'🛍️',name:'潮流商品',desc:'精选潮牌与本地好物'},{id:'story',icon:'📖',name:'品牌故事',desc:'了解春熙路百年变迁'},{id:'ar',icon:'🥽',name:'AR试穿',desc:'虚拟试穿最新潮流搭配'}],

        { id:'xc2', name:'火把广场·数字街区', city:'西昌', lat:27.8978, lng:102.2700, cover:'🔥',

    },
    guizhou: {
      label: '贵州', icon: '🏔️',
      center: [26.8, 106.5], zoom: 7,
      businesses: [
        { id:'gz1', name:'黄果树·数字瀑布', city:'安顺', lat:25.9852, lng:105.6669, cover:'🌊',
          description:'亚洲第一大瀑布黄果树的元宇宙数字孪生体验空间。',
          features:[{id:'tour',icon:'🌊',name:'云参观空间',desc:'360°全景漫游大瀑布'},{id:'products',icon:'🎁',name:'贵州好物',desc:'贵州特色产品'},{id:'story',icon:'📖',name:'瀑布传说',desc:'了解黄果树的故事'},{id:'ar',icon:'🥽',name:'AR漂流',desc:'虚拟漂流体验'}],
          products:[{id:'gz1-1',name:'茅台镇酱香白酒',price:899,image:'🍶',specs:['53度500ml','53度1L','礼盒装'],desc:'贵州茅台镇传统酱香白酒。'},{id:'gz1-2',name:'苗族银饰手镯',price:399,image:'💍',specs:['经典款','花丝款'],desc:'贵州苗族传统手工银饰。'}]},
        { id:'gz2', name:'千户苗寨·元宇宙', city:'黔东南', lat:26.3252, lng:108.2669, cover:'🏘️',
          description:'西江千户苗寨的数字化呈现，体验苗族文化。',
          features:[{id:'tour',icon:'🏘️',name:'云参观空间',desc:'VR漫游苗寨'},{id:'products',icon:'🧵',name:'苗绣好物',desc:'苗族刺绣工艺品'},{id:'story',icon:'📖',name:'苗族文化',desc:'探索苗族千年文化'},{id:'ar',icon:'🥽',name:'AR换装',desc:'AR试穿苗族服饰'}],
          products:[{id:'gz2-1',name:'苗绣香囊',price:88,image:'🪡',specs:['传统款','现代款'],desc:'手工苗绣香囊。'},{id:'gz2-2',name:'贵州高山绿茶',price:168,image:'🍵',specs:['250g','500g'],desc:'贵州都匀毛尖高山有机绿茶。'}]}
      ]
    }
  };

  let activeMapId='sichuan';
  let businesses=mapsData.sichuan.businesses;

  // ==================== 购物车 & 工具 ====================
  let cart=[],currentBusiness=null,currentProduct=null,selectedSpec='';
  function addToCart(p,b,s){const e=cart.find(i=>i.product.id===p.id&&i.spec===s);if(e)e.quantity++;else cart.push({product:p,businessName:b.name,spec:s,quantity:1});renderCartBadge();}
  function renderCartBadge(){const b=document.getElementById('cartBadge');if(!b)return;const c=cart.reduce((s,i)=>s+i.quantity,0);b.textContent=c;b.style.display=c>0?'flex':'none';}
  function getGradient(p){const cs=['linear-gradient(135deg,#667eea,#764ba2)','linear-gradient(135deg,#f093fb,#f5576c)','linear-gradient(135deg,#4facfe,#00f2fe)','linear-gradient(135deg,#43e97b,#38f9d7)','linear-gradient(135deg,#fa709a,#fee140)','linear-gradient(135deg,#a18cd1,#fbc2eb)','linear-gradient(135deg,#fccb90,#d57eeb)','linear-gradient(135deg,#e0c3fc,#8ec5fc)','linear-gradient(135deg,#f5576c,#ffcf71)','linear-gradient(135deg,#30cfd0,#330867)'];const idx=p.id.split('').reduce((s,c)=>s+c.charCodeAt(0),0)%cs.length;return cs[idx];}
  function showPage(id){
    document.querySelectorAll('.page').forEach(p=>{p.classList.remove('active');});
    const pg=document.getElementById(id);pg.classList.remove('hidden');pg.classList.add('active');
  }
  let toastTimer=null;
  function showToast(text){const t=document.getElementById('toast');const icon=t.querySelector('.ti'),txt=t.querySelector('.tt');const m=text.match(/^([\u{1F000}-\u{1FFFF}]|[\u2600-\u27BF]|[\u{2700}-\u{27BF}]|[✅🎉🚀🎬📖🥽🚧])/u);if(m){icon.textContent=m[0];txt.textContent=text.replace(m[0],'').trim();}else{icon.textContent='💡';txt.textContent=text;}t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);}

  function enterBusiness(bizId){
    const biz=businesses.find(b=>b.id===bizId);if(!biz)return;
    currentBusiness=biz;
    const c=document.getElementById('businessContent');
    let html='<div class="biz-header"><div class="hc">';
    html+='<div class="biz-btn-back" onclick="showPage(\'mapPage\')"><span>‹</span> 返回地图</div>';
    html+='<div class="biz-cover">'+biz.cover+'</div>';
    html+='<div class="biz-title">'+biz.name+'</div>';
    html+='<div class="biz-desc">'+biz.description+'</div>';
    html+='</div></div>';
    html+='<div class="sec-title"><h3>🏪 空间功能</h3></div><div class="f-grid">';
    biz.features.forEach((f,i)=>{html+='<div class="f-card" onclick="handleFeature(\''+f.id+'\',\''+biz.id+'\')" style="animation:fadeInUp .4s ease '+(i*0.1)+'s forwards;opacity:0"><div class="fi">'+f.icon+'</div><div class="fn">'+f.name+'</div><div class="fd">'+f.desc+'</div></div>';});
    html+='</div>';
    html+='<div class="sec-title"><h3>🛒 推荐商品</h3><span class="ml" onclick="showProductList(\''+biz.id+'\')">查看全部 ›</span></div><div class="f-prods">';
    biz.products.slice(0,4).forEach(p=>{html+='<div class="f-p-card" onclick="showProductDetail(\''+p.id+'\',\''+biz.id+'\')"><div class="pi" style="background:'+getGradient(p)+'">'+p.image+'</div><div class="pib"><div class="pn">'+p.name+'</div><div class="pp">'+p.price+'</div></div></div>';});
    html+='</div>';
    c.innerHTML=html;
    showPage('businessPage');
  }
  function handleFeature(fid,bizId){
    if(fid==='products'){showProductList(bizId);return;}
    const biz=businesses.find(b=>b.id===bizId);if(!biz)return;
    const f=biz.features.find(x=>x.id===fid);if(!f)return;
    // 泸州老窖云参观 → 720yun全景
    if(bizId==='lz1'&&fid==='tour'){
      document.getElementById('webviewTitle').textContent='泸州老窖·酒窖漫游';
      document.getElementById('webviewIframe').src='https://www.720yun.com/t/94vksmrwdde?scene_id=49356013';
      document.getElementById('webviewPage').classList.add('active');
      return;
    }
    const msgs={tour:'🎬 正在进入「'+f.name+'」...\n（演示模式：VR全景漫游）',story:'📖 「'+f.name+'」\n（演示模式：品牌故事展览）',ar:'🥽 正在启动AR模块...\n（演示模式：虚拟试穿/体验）'};
    showToast(msgs[fid]||'🚧 「'+f.name+'」开发中...');
  }
  // 关闭webview
  document.addEventListener('click',function(e){
    if(e.target&&e.target.id==='webviewBack'){
      document.getElementById('webviewPage').classList.remove('active');
      document.getElementById('webviewIframe').src='';
    }
  });
  function showProductList(bizId){
    const biz=businesses.find(b=>b.id===bizId);if(!biz)return;
    currentBusiness=biz;
    let html='<div class="pl-hdr"><span class="bb" onclick="showPage(\'businessPage\')">‹</span><h2>'+biz.name+'</h2><span class="ci" onclick="showCartPage()">🛒<span class="cart-badge" id="cartBadge2"></span></span></div><div class="p-grid">';
    biz.products.forEach(p=>{html+='<div class="p-card" onclick="showProductDetail(\''+p.id+'\',\''+biz.id+'\')"><div class="pi-big" style="background:'+getGradient(p)+'">'+p.image+'</div><div class="pbody"><div class="pn2">'+p.name+'</div><div class="pp2">¥'+p.price+'</div></div></div>';});
    html+='</div>';
    document.getElementById('productListContent').innerHTML=html;
    const b2=document.getElementById('cartBadge2');if(b2){const c=cart.reduce((s,i)=>s+i.quantity,0);b2.textContent=c;b2.style.display=c>0?'flex':'none';}
    showPage('productListPage');
  }
  function showProductDetail(pid,bizId){
    const biz=businesses.find(b=>b.id===bizId);if(!biz)return;
    const p=biz.products.find(x=>x.id===pid);if(!p)return;
    currentProduct=p;currentBusiness=biz;selectedSpec=p.specs[0];
    let html='<div class="pd-detail"><div class="pd-hdr" style="background:'+getGradient(p)+'"><span style="font-size:70px">'+p.image+'</span><div class="pd-back" onclick="showProductList(\''+biz.id+'\')">‹</div><div class="pd-cart-btn" onclick="showCartPage()">🛒</div></div><div class="pd-info"><div class="pd-name">'+p.name+'</div><div class="pd-price">¥'+p.price+'</div><div class="pd-st">选择规格</div><div class="pd-specs" id="specOptions">';
    p.specs.forEach((s,i)=>{html+='<button class="pd-spec'+(i===0?' selected':'')+'" onclick="selectSpec(this,\''+s+'\')">'+s+'</button>';});
    html+='</div><div class="pd-desc2">'+p.desc+'</div></div></div><div class="buy-bar"><button class="bb2" onclick="addToCartFromDetail()">🛒 加入购物车</button><button class="bbb" onclick="buyNow()">立即购买</button></div>';
    document.getElementById('productDetailContent').innerHTML=html;
    showPage('productDetailPage');
  }
  function selectSpec(el,spec){document.querySelectorAll('.pd-spec').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');selectedSpec=spec;}
  function addToCartFromDetail(){if(!currentProduct||!currentBusiness)return;addToCart(currentProduct,currentBusiness,selectedSpec||currentProduct.specs[0]);showToast('✅ 已加入购物车');}
  function buyNow(){if(!currentProduct||!currentBusiness)return;addToCart(currentProduct,currentBusiness,selectedSpec||currentProduct.specs[0]);showToast('🎉 购买成功！（演示模式）');}
  function showCartPage(){
    const c=document.getElementById('cartContent');
    if(cart.length===0){
      c.innerHTML='<div class="cart-hdr"><span class="bb" onclick="goBackFromCart()">‹</span><h2>购物车</h2></div><div class="cart-empty"><div class="ei">🛒</div><div class="et">购物车还是空的</div></div>';
    }else{
      let html='<div class="cart-hdr"><span class="bb" onclick="goBackFromCart()">‹</span><h2>购物车</h2><span style="font-size:12px;color:var(--txt3)">共'+cart.reduce((s,i)=>s+i.quantity,0)+'件</span></div><div class="cart-list">';
      cart.forEach(item=>{html+='<div class="cart-item"><div class="ci-img" style="background:'+getGradient(item.product)+'">'+item.product.image+'</div><div class="ci-info"><div class="ci-name">'+item.product.name+'</div><div class="ci-spec">'+item.spec+' × '+item.quantity+'</div><div class="ci-bot"><span class="ci-price">¥'+(item.product.price*item.quantity)+'</span><span style="font-size:11px;color:var(--txt3)">'+item.businessName+'</span></div></div></div>';});
      html+='</div>';
      c.innerHTML=html;
    }
    showPage('cartPage');
  }
  function goBackFromCart(){for(const pid of['businessPage','productListPage','productDetailPage']){const el=document.getElementById(pid);if(el&&el.classList.contains('active')){showPage(pid);return;}}showPage('mapPage');}

  // ==================== 状态栏时间 ====================
  function updateStatusTime(){
    const d=new Date();
    document.getElementById('statusTime').textContent=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  }
  updateStatusTime();
  setInterval(updateStatusTime,30000);

  // ==================== Leaflet 多地图 ====================
  const cityColors = { '成都':'#6c63ff', '泸州':'#00d4ff', '西昌':'#ff6b6b', '安顺':'#00d4ff', '黔东南':'#ff6b6b' };

  const map = L.map('mapLeaflet', {
    center: [29.5, 103.5], zoom: 7, zoomControl: true, attributionControl: false
  });

  L.tileLayer('https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
    maxZoom: 18, minZoom: 4
  }).addTo(map);

  let markerGroup=null;

  function createPulseIcon(color, name) {
    return L.divIcon({
      className: 'pulse-icon',
      html: '<div class="marker-label">'+name+'</div><div class="pulse-marker"><div class="pulse-ring" style="border:3px solid '+color+'"></div><div class="pulse-dot" style="background:'+color+';box-shadow:0 2px 12px '+color+'80"></div></div>',
      iconSize: [44,58], iconAnchor: [22,58], popupAnchor: [0,-48]
    });
  }

  function renderMarkers(){
    if(markerGroup){map.removeLayer(markerGroup);}
    const ms=[];
    businesses.forEach(biz => {
      const color = cityColors[biz.city]||'#6c63ff';
      const marker = L.marker([biz.lat, biz.lng], { icon:createPulseIcon(color,biz.name.split('·')[0]), title:biz.name });
      marker.bindPopup(
        '<div class="pop-cover">'+biz.cover+'</div>'+
        '<div class="pop-name">'+biz.name+'</div>'+
        '<div class="pop-city">◆ '+biz.city+'</div>'+
        '<div class="pop-desc">'+biz.description+'</div>'+
        '<div class="pop-tags">'+biz.products.slice(0,3).map(p=>'<span class="pop-tag">'+p.name+'</span>').join('')+'</div>'+
        '<button class="pop-btn" onclick="enterBusiness(\''+biz.id+'\')">进入商家空间 ›</button>',
        { maxWidth:260 });
      ms.push(marker);
    });
    markerGroup=L.featureGroup(ms).addTo(map);
    try{map.fitBounds(markerGroup.getBounds().pad(0.2));}catch(e){}
  }

  // 地图切换
  function switchMap(id){
    const m=mapsData[id];if(!m)return;
    activeMapId=id;businesses=m.businesses;
    document.querySelectorAll('.map-tab').forEach(t=>t.classList.toggle('active',t.dataset.map===id));
    renderMarkers();
    renderMerchantList();
    setTimeout(()=>map.invalidateSize(),100);
  }

  // 初始化切换条
  (function initSwiper(){
    const swiper=document.getElementById('mapSwiper');
    swiper.innerHTML=Object.keys(mapsData).map(id=>{
      const m=mapsData[id];
      return '<div class="map-tab" data-map="'+id+'" onclick="switchMap(\''+id+'\')"><span>'+m.icon+'</span> '+m.label+'</div>';
    }).join('');
    // 默认选中第一个
    document.querySelector('.map-tab').classList.add('active');
  })();

  // 初始渲染
  renderMarkers();
  setTimeout(() => map.invalidateSize(), 100);

  // ==================== 侧边栏 ====================
  function renderMerchantList(filtered) {
    if(!filtered)filtered=businesses;
    const list = document.getElementById('merchantList');
    list.innerHTML = filtered.map(b => '<div class="sb-item" onclick="enterBusiness(\''+b.id+'\');closeSidebar()"><div class="sn"><span class="cover">'+b.cover+'</span>'+b.name+'</div><div class="scity">◆ '+b.city+' · '+b.products.length+'件好物</div><span class="sbadge">'+b.products.length+'件</span></div>').join('');
  }

  function closeSidebar(){document.getElementById('sidebar').classList.remove('open');}

  document.getElementById('menuToggle').addEventListener('click',()=>{document.getElementById('sidebar').classList.toggle('open');});
  document.getElementById('searchInput').addEventListener('input', function(e) {
    const kw = e.target.value.trim().toLowerCase();
    renderMerchantList(kw ? businesses.filter(b => b.name.toLowerCase().includes(kw)||b.city.includes(kw)) : businesses);
  });
  renderMerchantList();
  renderCartBadge();
</script>
</body>
